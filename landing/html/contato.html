<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fale conosco — Unilix</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Plus Jakarta Sans',sans-serif;background:#0B0E1A;color:#f0f2ff;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 20px}
.card{background:#12172B;border:1px solid rgba(255,255,255,0.08);border-radius:20px;padding:40px 36px;width:100%;max-width:480px}
.logo{font-size:1.1rem;font-weight:800;color:white;margin-bottom:28px;display:flex;align-items:center;gap:8px}
.logo span{background:linear-gradient(135deg,#5B5EF4,#00D2FF);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
h1{font-size:1.5rem;font-weight:800;margin-bottom:6px;letter-spacing:-0.02em}
p{font-size:0.875rem;color:rgba(255,255,255,0.45);margin-bottom:28px;line-height:1.6}
label{display:block;font-size:0.72rem;font-weight:700;color:rgba(255,255,255,0.4);text-transform:uppercase;letter-spacing:0.06em;margin-bottom:6px}
input,textarea,select{width:100%;background:rgba(255,255,255,0.05);border:1.5px solid rgba(255,255,255,0.08);border-radius:10px;padding:12px 14px;color:#f0f2ff;font-family:'Plus Jakarta Sans',sans-serif;font-size:0.9375rem;outline:none;transition:border-color .2s;margin-bottom:16px}
input:focus,textarea:focus,select:focus{border-color:#5B5EF4}
input::placeholder,textarea::placeholder{color:rgba(255,255,255,0.2)}
select option{background:#12172B}
textarea{resize:vertical;min-height:120px}
button{width:100%;padding:14px;border:none;border-radius:10px;background:linear-gradient(135deg,#5B5EF4,#00D2FF);color:#fff;font-family:'Plus Jakarta Sans',sans-serif;font-size:1rem;font-weight:700;cursor:pointer;transition:opacity .2s}
button:hover{opacity:.9}
button:disabled{opacity:.5;cursor:not-allowed}
.success{display:none;text-align:center;padding:20px 0}
.success .emoji{font-size:3rem;margin-bottom:12px}
.success h2{font-size:1.25rem;font-weight:700;margin-bottom:8px}
.success p{color:rgba(255,255,255,0.45)}
.back{display:block;text-align:center;margin-top:20px;font-size:0.875rem;color:rgba(255,255,255,0.3);text-decoration:none;transition:color .2s}
.back:hover{color:rgba(255,255,255,0.7)}
.error-msg{background:rgba(239,68,68,0.1);border:1px solid rgba(239,68,68,0.3);border-radius:8px;padding:10px 14px;font-size:0.875rem;color:#ef4444;margin-bottom:14px;display:none}
</style>
</head>
<body>
<div class="card">
  <div class="logo">Uni<span>lix</span></div>
  
  <div id="formArea">
    <h1>Fale conosco</h1>
    <p>Dúvida, sugestão ou quer saber mais sobre o ListaFácil? Manda sua mensagem!</p>
    
    <div id="errorMsg" class="error-msg"></div>
    
    <div>
      <label>Nome</label>
      <input type="text" id="nome" placeholder="Seu nome">
    </div>
    <div>
      <label>WhatsApp</label>
      <input type="tel" id="whatsapp" placeholder="(11) 99999-9999">
    </div>
    <div>
      <label>E-mail</label>
      <input type="email" id="email" placeholder="seu@email.com">
    </div>
    <div>
      <label>Assunto</label>
      <select id="assunto">
        <option value="">Selecione...</option>
        <option value="duvida">Dúvida sobre o produto</option>
        <option value="plano">Quero conhecer os planos</option>
        <option value="suporte">Suporte técnico</option>
        <option value="parceria">Parceria comercial</option>
        <option value="outro">Outro</option>
      </select>
    </div>
    <div>
      <label>Mensagem</label>
      <textarea id="mensagem" placeholder="Escreva sua mensagem..."></textarea>
    </div>
    
    <button id="btnEnviar" onclick="enviarContato()">Enviar mensagem</button>
  </div>
  
  <div class="success" id="successArea">
    <div class="emoji">✅</div>
    <h2>Mensagem enviada!</h2>
    <p>Recebemos sua mensagem e responderemos em breve pelo WhatsApp ou e-mail.</p>
  </div>
  
  <a href="listafacil.html" class="back">← Voltar para o ListaFácil</a>
</div>

<script>
const SB_URL  = 'https://zlxsbnrtgieclpypztow.supabase.co';
const SB_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InpseHNibnJ0Z2llY2xweXB6dG93Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM2NTEwODQsImV4cCI6MjA4OTIyNzA4NH0.Tg45Vjofb-NMqDtPCTw0pbFmxQbUBotiNAKknrLtSX0';

async function enviarContato() {
  const nome     = document.getElementById('nome').value.trim();
  const whatsapp = document.getElementById('whatsapp').value.trim();
  const email    = document.getElementById('email').value.trim();
  const assunto  = document.getElementById('assunto').value;
  const mensagem = document.getElementById('mensagem').value.trim();
  const errEl    = document.getElementById('errorMsg');
  
  errEl.style.display = 'none';
  
  if (!nome)     { errEl.textContent='Informe seu nome.';errEl.style.display='block';return; }
  if (!whatsapp && !email) { errEl.textContent='Informe WhatsApp ou e-mail.';errEl.style.display='block';return; }
  if (!mensagem) { errEl.textContent='Escreva sua mensagem.';errEl.style.display='block';return; }
  
  const btn = document.getElementById('btnEnviar');
  btn.disabled = true;
  btn.textContent = 'Enviando...';
  
  try {
    const res = await fetch(SB_URL + '/rest/v1/contatos', {
      method: 'POST',
      headers: {
        'apikey': SB_ANON,
        'Authorization': 'Bearer ' + SB_ANON,
        'Content-Type': 'application/json',
        'Prefer': 'return=minimal'
      },
      body: JSON.stringify({ nome, whatsapp, email, assunto, mensagem, origem: 'listafacil' })
    });
    
    if (res.ok || res.status === 201) {
      document.getElementById('formArea').style.display = 'none';
      document.getElementById('successArea').style.display = 'block';
    } else {
      throw new Error('Erro ' + res.status);
    }
  } catch(e) {
    errEl.textContent = 'Erro ao enviar. Tente novamente.';
    errEl.style.display = 'block';
    btn.disabled = false;
    btn.textContent = 'Enviar mensagem';
  }
}
</script>
</body>
</html>
