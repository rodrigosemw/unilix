<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Autenticando… | Unilix</title>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Plus Jakarta Sans', sans-serif; background: #0B0E1A; color: #fff; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
    .card { background: #12172B; border: 1px solid rgba(255,255,255,0.08); border-radius: 20px; padding: 48px 40px; text-align: center; max-width: 440px; width: 90%; box-shadow: 0 24px 64px rgba(0,0,0,0.4); }
    .logo { display: flex; align-items: center; justify-content: center; gap: 10px; font-size: 1.125rem; font-weight: 800; margin-bottom: 36px; color: #fff; }
    .spinner { width: 52px; height: 52px; border: 3px solid rgba(255,255,255,0.08); border-top-color: #5B5EF4; border-right-color: #00D2FF; border-radius: 50%; animation: spin 0.9s linear infinite; margin: 0 auto 24px; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .icon { display: none; font-size: 3rem; margin-bottom: 16px; }
    h1 { font-size: 1.25rem; font-weight: 700; margin-bottom: 8px; }
    p { font-size: 0.9rem; color: rgba(255,255,255,0.55); line-height: 1.6; }
    .url-box { display:none; background: rgba(91,94,244,0.12); border: 1px solid rgba(91,94,244,0.3); border-radius: 10px; padding: 12px 16px; margin: 16px 0; }
    .url-box a { color: #00D2FF; font-weight: 600; font-size: 0.9375rem; text-decoration: none; }
    .error-box { display: none; background: #FEF2F2; border-radius: 8px; padding: 12px; color: #DC2626; margin-top: 16px; font-size: 0.875rem; }
    .btn-back { display: none; margin-top: 20px; padding: 11px 24px; border-radius: 10px; border: 1.5px solid rgba(255,255,255,0.15); background: transparent; color: rgba(255,255,255,0.7); font-family: inherit; font-size: 0.875rem; font-weight: 600; cursor: pointer; }
    .progress { height: 3px; background: rgba(255,255,255,0.07); border-radius: 2px; margin-top: 24px; overflow: hidden; display: none; }
    .progress-bar { height: 100%; width: 0%; background: linear-gradient(90deg, #5B5EF4, #00D2FF); border-radius: 2px; transition: width 0.4s; }
    .steps { display: none; margin: 20px 0 0; text-align: left; }
    .step { display: flex; align-items: center; gap: 10px; padding: 8px 0; font-size: 0.875rem; color: rgba(255,255,255,0.5); border-bottom: 1px solid rgba(255,255,255,0.05); }
    .step:last-child { border-bottom: none; }
    .step.done { color: #10B981; }
    .step.active { color: #fff; }
    .step-dot { width: 8px; height: 8px; border-radius: 50%; background: rgba(255,255,255,0.2); flex-shrink: 0; }
    .step.done .step-dot { background: #10B981; }
    .step.active .step-dot { background: #5B5EF4; animation: pulse 1s ease-in-out infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
  </style>
</head>
<body>
<div class="card">
  <div class="logo">
    <svg viewBox="0 0 32 32" fill="none" width="28" height="28">
      <path d="M6 6 L6 20 Q6 26 16 26 Q26 26 26 20 L26 6" stroke="url(#g)" stroke-width="3.5" stroke-linecap="round" fill="none"/>
      <circle cx="6" cy="5" r="3" fill="url(#g)"/>
      <circle cx="26" cy="5" r="3" fill="url(#g)"/>
      <circle cx="16" cy="26" r="3" fill="#00D2FF" opacity="0.85"/>
      <defs><linearGradient id="g" x1="6" y1="6" x2="26" y2="26" gradientUnits="userSpaceOnUse">
        <stop offset="0%" stop-color="#5B5EF4"/><stop offset="100%" stop-color="#00D2FF"/>
      </linearGradient></defs>
    </svg>
    Unilix
  </div>

  <div class="icon" id="icon"></div>
  <div class="spinner" id="spinner"></div>
  <h1 id="title">Autenticando…</h1>
  <p id="desc">Verificando sua conta. Aguarde.</p>

  <div class="steps" id="steps">
    <div class="step" id="step1"><div class="step-dot"></div> Conta verificada</div>
    <div class="step" id="step2"><div class="step-dot"></div> Criando seu espaço</div>
    <div class="step" id="step3"><div class="step-dot"></div> Configurando subdomínio</div>
    <div class="step" id="step4"><div class="step-dot"></div> Enviando email de acesso</div>
  </div>

  <div class="url-box" id="urlBox">
    <p style="color:rgba(255,255,255,0.6); font-size:0.8rem; margin-bottom:4px;">Seu endereço:</p>
    <a id="urlLink" href="#" target="_blank"></a>
  </div>

  <div class="error-box" id="errorBox"></div>
  <button class="btn-back" id="btnBack" onclick="window.location.href='/listafacil.html'">← Voltar</button>
  <div class="progress" id="progress"><div class="progress-bar" id="progressBar"></div></div>
</div>

<script type="module">
  import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm';

  const sb = createClient(
    'https://zlxsbnrtgieclpypztow.supabase.co',
    'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InpseHNibnJ0Z2llY2xweXB6dG93Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM2NTEwODQsImV4cCI6MjA4OTIyNzA4NH0.Tg45Vjofb-NMqDtPCTw0pbFmxQbUBotiNAKknrLtSX0'
  );

  function setStep(n, estado) {
    const el = document.getElementById('step' + n);
    if (!el) return;
    el.className = 'step ' + estado;
  }

  function setEstado(estado, titulo, desc) {
    document.getElementById('title').textContent = titulo;
    document.getElementById('desc').textContent = desc || '';
    if (estado === 'loading') {
      document.getElementById('spinner').style.display = 'block';
      document.getElementById('icon').style.display = 'none';
      document.getElementById('steps').style.display = 'block';
    } else if (estado === 'success') {
      document.getElementById('spinner').style.display = 'none';
      const ic = document.getElementById('icon');
      ic.style.display = 'block';
      ic.textContent = '🎉';
      const p = document.getElementById('progress');
      p.style.display = 'block';
      let pct = 0;
      const bar = document.getElementById('progressBar');
      const iv = setInterval(() => { pct += 1; bar.style.width = pct + '%'; if (pct >= 100) clearInterval(iv); }, 40);
    } else if (estado === 'error') {
      document.getElementById('spinner').style.display = 'none';
      document.getElementById('icon').style.display = 'block';
      document.getElementById('icon').textContent = '❌';
      document.getElementById('steps').style.display = 'none';
      const e = document.getElementById('errorBox');
      e.style.display = 'block';
      e.textContent = desc || titulo;
      document.getElementById('title').textContent = 'Erro na autenticação';
      document.getElementById('desc').textContent = '';
      document.getElementById('btnBack').style.display = 'inline-block';
    }
  }

  async function processar() {
    try {
      setEstado('loading', 'Verificando conta…', 'Aguarde um instante.');
      setStep(1, 'active');

      const { data, error } = await sb.auth.getSession();
      if (error) { setEstado('error', 'Erro', error.message); return; }

      if (!data.session) {
        setEstado('error', 'Erro', 'Sessão não encontrada. Tente novamente.');
        return;
      }

      const user  = data.session.user;
      const nome  = user.user_metadata?.full_name || user.email.split('@')[0];
      const email = user.email;

      setStep(1, 'done');
      setStep(2, 'active');
      setEstado('loading', 'Criando seu espaço…', 'Isso pode levar alguns segundos.');

      let clienteUrl = null;
      try {
        const resp = await fetch('https://api.unilix.tech/criar-cliente', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ nome, email, plano: 'free' })
        });
        const resultado = await resp.json();
        if (resultado.ok && resultado.job_id) {
          // Aguarda o job assíncrono
          const jobId = resultado.job_id;
          let done = false;
          for (let i = 0; i < 40; i++) {
            await new Promise(r => setTimeout(r, 3000));
            try {
              const sr = await fetch('https://api.unilix.tech/status/' + jobId);
              const sd = await sr.json();
              if (sd.status === 'done' && sd.result?.ok) {
                clienteUrl = sd.result.url;
                done = true;
                break;
              } else if (sd.status === 'error') break;
            } catch(e) {}
          }
          if (done) {
            setStep(2, 'done');
            setStep(3, 'done');
            setStep(4, 'done');
          }
        } else if (resultado.ok && resultado.url) {
          clienteUrl = resultado.url;
          setStep(2, 'done');
          setStep(3, 'done');
          setStep(4, 'done');
        }
      } catch(e) {
        console.warn('Orquestrador:', e.message);
        setStep(2, 'done');
      }

      if (clienteUrl) {
        const box  = document.getElementById('urlBox');
        const link = document.getElementById('urlLink');
        box.style.display = 'block';
        link.href         = clienteUrl;
        link.textContent  = clienteUrl;
      }

      setEstado('success',
        `Bem-vindo, ${nome}! 🎉`,
        clienteUrl
          ? 'Seu espaço está pronto! Enviamos os detalhes por email.'
          : 'Conta criada! Em breve você receberá um email com seu link de acesso.'
      );

      setTimeout(() => {
        window.location.href = clienteUrl || '/listafacil.html';
      }, 5000);

    } catch(e) {
      setEstado('error', 'Erro inesperado', e.message);
    }
  }

  processar();
</script>
</body>
</html>
