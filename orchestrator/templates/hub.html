<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<title>Unilix — Hub</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#0B0E1A;
  --s1:#12172B;
  --s2:#1a1f35;
  --border:rgba(255,255,255,0.08);
  --text:#f0f2ff;
  --muted:rgba(255,255,255,0.45);
  --primary:#5B5EF4;
  --accent:#00D2FF;
  --gradient:linear-gradient(135deg,#5B5EF4,#00D2FF);
  --green:#10B981;
  --red:#ef4444;
  --font:'Plus Jakarta Sans',sans-serif;
  --radius:16px;
}
body{
  background:var(--bg);
  color:var(--text);
  font-family:var(--font);
  min-height:100vh;
  -webkit-font-smoothing:antialiased;
  overflow-x:hidden;
}

/* Background */
.bg-glow{
  position:fixed;inset:0;pointer-events:none;z-index:0;
  background:
    radial-gradient(ellipse 600px 400px at 20% 20%,rgba(91,94,244,0.12) 0%,transparent 70%),
    radial-gradient(ellipse 500px 300px at 80% 80%,rgba(0,210,255,0.08) 0%,transparent 70%);
}
.bg-grid{
  position:fixed;inset:0;pointer-events:none;z-index:0;
  background-image:
    linear-gradient(rgba(255,255,255,0.02) 1px,transparent 1px),
    linear-gradient(90deg,rgba(255,255,255,0.02) 1px,transparent 1px);
  background-size:48px 48px;
  mask-image:radial-gradient(ellipse at center,rgba(0,0,0,0.4) 0%,transparent 75%);
}

/* Login */
#loginScreen{
  position:fixed;inset:0;z-index:100;
  display:flex;align-items:center;justify-content:center;padding:20px;
}
.login-box{
  background:var(--s1);
  border:1px solid var(--border);
  border-radius:24px;
  padding:40px 36px;
  width:100%;max-width:400px;
  animation:popIn .25s ease;
  position:relative;z-index:1;
}
.login-logo{
  display:flex;align-items:center;gap:10px;
  justify-content:center;
  margin-bottom:8px;
}
.login-logo-text{
  font-size:1.5rem;font-weight:800;letter-spacing:-0.02em;
}
.login-logo-text span{
  background:var(--gradient);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}
.login-sub{
  text-align:center;font-size:0.875rem;color:var(--muted);margin-bottom:28px;
}
.login-field{margin-bottom:14px;}
.login-label{
  display:block;font-size:0.75rem;font-weight:700;
  color:var(--muted);text-transform:uppercase;letter-spacing:0.06em;margin-bottom:6px;
}
.login-input{
  width:100%;padding:12px 16px;
  background:var(--s2);border:1.5px solid var(--border);
  border-radius:10px;color:var(--text);font-family:var(--font);font-size:0.9375rem;
  outline:none;transition:border-color .2s;
}
.login-input:focus{border-color:var(--primary);}
.login-input::placeholder{color:var(--muted);}
.login-btn{
  width:100%;padding:13px;border:none;border-radius:10px;
  background:var(--gradient);color:#fff;
  font-family:var(--font);font-size:1rem;font-weight:700;
  cursor:pointer;transition:opacity .2s,transform .2s;margin-top:6px;
}
.login-btn:hover{opacity:.9;transform:translateY(-1px);}
.login-btn:active{transform:scale(.98);}
.login-error{
  background:rgba(239,68,68,0.1);border:1px solid rgba(239,68,68,0.3);
  border-radius:8px;padding:10px 14px;font-size:0.875rem;color:#ef4444;
  text-align:center;margin-bottom:12px;display:none;
}

/* App */
#appScreen{display:none;}

/* Topbar */
.topbar{
  position:sticky;top:0;z-index:50;
  background:rgba(11,14,26,0.85);
  backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  border-bottom:1px solid var(--border);
  padding:0 24px;height:60px;
  display:flex;align-items:center;justify-content:space-between;
}
.topbar-logo{
  display:flex;align-items:center;gap:8px;
  font-size:1.125rem;font-weight:800;letter-spacing:-0.02em;
}
.topbar-logo span{
  background:var(--gradient);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}
.topbar-right{display:flex;align-items:center;gap:12px;}
.user-chip{
  display:flex;align-items:center;gap:8px;
  padding:5px 12px 5px 6px;
  background:var(--s2);border:1px solid var(--border);border-radius:100px;
  font-size:0.8125rem;font-weight:600;
}
.user-avatar{
  width:26px;height:26px;border-radius:50%;
  background:var(--gradient);
  display:flex;align-items:center;justify-content:center;
  font-size:0.7rem;font-weight:800;color:#fff;
}
.btn-sair{
  padding:6px 14px;border-radius:8px;
  border:1px solid var(--border);background:transparent;
  color:var(--muted);font-family:var(--font);font-size:0.8125rem;
  font-weight:600;cursor:pointer;transition:all .2s;
}
.btn-sair:hover{border-color:rgba(239,68,68,0.4);color:#ef4444;}

/* Main */
.main{
  position:relative;z-index:1;
  max-width:600px;margin:0 auto;
  padding:48px 24px 80px;
}
.main-greeting{
  margin-bottom:48px;
}
.main-greeting h1{
  font-size:clamp(1.5rem,3vw,2rem);font-weight:800;
  letter-spacing:-0.02em;margin-bottom:6px;
}
.main-greeting p{
  font-size:0.9375rem;color:var(--muted);
}

/* Módulos */
.modulos-label{
  font-size:0.75rem;font-weight:700;color:var(--muted);
  text-transform:uppercase;letter-spacing:0.08em;
  margin-bottom:20px;
}
.modulos-grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(280px,1fr));
  gap:20px;
  margin-bottom:48px;
}
.modulo-card{
  background:var(--s1);
  border:1px solid var(--border);
  border-radius:var(--radius);
  overflow:hidden;
  transition:border-color .25s,transform .25s,box-shadow .25s;
}
.modulo-card:hover{
  border-color:rgba(91,94,244,0.35);
  transform:translateY(-3px);
  box-shadow:0 12px 40px rgba(91,94,244,0.12);
}
.modulo-header{
  padding:24px 24px 20px;
  display:flex;align-items:center;gap:14px;
  border-bottom:1px solid var(--border);
}
.modulo-icon{
  width:48px;height:48px;border-radius:14px;
  display:flex;align-items:center;justify-content:center;
  font-size:1.5rem;flex-shrink:0;
}
.modulo-info h3{
  font-size:1.0625rem;font-weight:700;margin-bottom:3px;
}
.modulo-info p{
  font-size:0.8125rem;color:var(--muted);line-height:1.5;
}
.modulo-apps{
  padding:16px;
  display:flex;flex-direction:column;gap:8px;
}
.app-btn{
  display:flex;align-items:center;gap:12px;
  padding:12px 14px;border-radius:10px;
  background:var(--s2);border:1px solid var(--border);
  text-decoration:none;color:var(--text);
  transition:all .2s;cursor:pointer;
}
.app-btn:hover{
  background:rgba(91,94,244,0.08);
  border-color:rgba(91,94,244,0.3);
}
.app-btn-icon{
  width:32px;height:32px;border-radius:8px;
  display:flex;align-items:center;justify-content:center;
  font-size:1rem;flex-shrink:0;
}
.app-btn-info{flex:1;}
.app-btn-name{font-size:0.875rem;font-weight:700;margin-bottom:1px;}
.app-btn-desc{font-size:0.75rem;color:var(--muted);}
.app-btn-arrow{
  font-size:1rem;color:var(--muted);
  transition:transform .2s,color .2s;
}
.app-btn:hover .app-btn-arrow{
  transform:translateX(3px);color:var(--primary);
}

/* Módulo cores */
.mod-estoque .modulo-icon{background:rgba(16,185,129,0.12);}
.mod-pdv .modulo-icon{background:rgba(91,94,244,0.12);}
.mod-financeiro .modulo-icon{background:rgba(245,158,11,0.12);}
.mod-pessoal .modulo-icon{background:rgba(239,68,68,0.12);}

.app-estoque .app-btn-icon{background:rgba(16,185,129,0.12);}
.app-pdv .app-btn-icon{background:rgba(91,94,244,0.12);}

/* Toast */
.toast{
  position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(8px);
  background:var(--s1);border:1px solid var(--border);border-radius:10px;
  padding:10px 20px;font-size:0.875rem;font-weight:600;
  z-index:9999;opacity:0;transition:all .25s;pointer-events:none;white-space:nowrap;
}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
.toast.ok{border-color:rgba(16,185,129,0.4);color:var(--green);}
.toast.err{border-color:rgba(239,68,68,0.4);color:var(--red);}

/* Spinner */
.spin{
  width:36px;height:36px;border:3px solid var(--border);
  border-top-color:var(--primary);border-radius:50%;
  animation:spin .7s linear infinite;margin:0 auto;
}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes popIn{from{transform:scale(.94);opacity:0}to{transform:scale(1);opacity:1}}
@keyframes fadeIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:none}}
.fade-in{animation:fadeIn .4s ease both;}

/* SVG Logo */
.unilix-logo{width:28px;height:28px;flex-shrink:0;}

/* Responsive */
@media(max-width:480px){
  .main{padding:32px 16px 60px;}
  .topbar{padding:0 16px;}
  .modulos-grid{grid-template-columns:1fr;}
}
</style>
</head>
<body>
<div class="bg-glow"></div>
<div class="bg-grid"></div>
<div class="toast" id="toast"></div>

<!-- LOGIN -->
<div id="loginScreen">
  <div class="login-box">
    <div class="login-logo">
      <svg class="unilix-logo" viewBox="0 0 32 32" fill="none">
        <path d="M6 6 L6 20 Q6 26 16 26 Q26 26 26 20 L26 6" stroke="url(#lg)" stroke-width="3.5" stroke-linecap="round" fill="none"/>
        <circle cx="6" cy="5" r="3" fill="url(#lg)"/>
        <circle cx="26" cy="5" r="3" fill="url(#lg)"/>
        <circle cx="16" cy="26" r="3" fill="#00D2FF" opacity="0.85"/>
        <defs>
          <linearGradient id="lg" x1="6" y1="6" x2="26" y2="26" gradientUnits="userSpaceOnUse">
            <stop offset="0%" stop-color="#5B5EF4"/>
            <stop offset="100%" stop-color="#00D2FF"/>
          </linearGradient>
        </defs>
      </svg>
      <span class="login-logo-text">Uni<span>lix</span></span>
    </div>
    <p class="login-sub">Acesse sua plataforma</p>
    <div id="loginError" class="login-error"></div>
    <div class="login-field">
      <label class="login-label">Usuário</label>
      <input class="login-input" id="loginUser" type="text" placeholder="seu.usuario" autocomplete="username" onkeydown="if(event.key==='Enter')document.getElementById('loginPass').focus()">
    </div>
    <div class="login-field">
      <label class="login-label">Senha</label>
      <input class="login-input" id="loginPass" type="password" placeholder="••••••••" autocomplete="current-password" onkeydown="if(event.key==='Enter')_login()">
    </div>
    <button class="login-btn" onclick="_login()">Entrar</button>
  </div>
</div>

<!-- APP -->
<div id="appScreen">
  <nav class="topbar">
    <div class="topbar-logo">
      <svg class="unilix-logo" viewBox="0 0 32 32" fill="none">
        <path d="M6 6 L6 20 Q6 26 16 26 Q26 26 26 20 L26 6" stroke="url(#lg2)" stroke-width="3.5" stroke-linecap="round" fill="none"/>
        <circle cx="6" cy="5" r="3" fill="url(#lg2)"/>
        <circle cx="26" cy="5" r="3" fill="url(#lg2)"/>
        <circle cx="16" cy="26" r="3" fill="#00D2FF" opacity="0.85"/>
        <defs>
          <linearGradient id="lg2" x1="6" y1="6" x2="26" y2="26" gradientUnits="userSpaceOnUse">
            <stop offset="0%" stop-color="#5B5EF4"/>
            <stop offset="100%" stop-color="#00D2FF"/>
          </linearGradient>
        </defs>
      </svg>
      Uni<span>lix</span>
    </div>
    <div class="topbar-right">
      <div class="user-chip">
        <div class="user-avatar" id="userAvatar">U</div>
        <span id="userName">Usuário</span>
      </div>
      <button class="btn-sair" onclick="_sair()">↩ Sair</button>
    </div>
  </nav>

  <main class="main">
    <div class="main-greeting fade-in">
      <h1 id="greetingTitle">Olá! 👋</h1>
      <p id="greetingDesc">Selecione um módulo para começar</p>
    </div>
    <div class="modulos-label">Seus módulos</div>
    <div class="modulos-grid" id="modulosGrid">
      <div style="text-align:center;padding:40px;color:var(--muted)">
        <div class="spin" style="margin-bottom:16px"></div>
        <p>Carregando módulos...</p>
      </div>
    </div>
  </main>
</div>

<script>
const SB_URL = '{{SUPABASE_URL}}';
const SB_ANON = '{{SUPABASE_KEY}}';
const H = {'apikey': SB_ANON, 'Authorization': 'Bearer ' + SB_ANON, 'Content-Type': 'application/json'};

// Definição de todos os módulos disponíveis
const MODULOS_DEF = {
  estoque: {
    id: 'estoque',
    nome: 'Módulo Estoque',
    desc: 'Controle de compras, listas e estoque',
    icon: '📦',
    classe: 'mod-estoque',
    apps: [
      {
        id: 'listafacil',
        nome: 'ListaFácil',
        desc: 'Listas colaborativas de compras',
        icon: '🛒',
        classe: 'app-estoque',
        url: '/estoque/listafacil.html'
      },
      {
        id: 'contagem',
        nome: 'ContagemFácil',
        desc: 'Contagem e controle de estoque',
        icon: '📦',
        classe: 'app-estoque',
        url: '/estoque/contagem.html',
        modulo_required: 'contagem'
      },
    ]
  },
  pdv: {
    id: 'pdv',
    nome: 'Módulo PDV',
    desc: 'Ponto de venda, comandas e produtos',
    icon: '🧾',
    classe: 'mod-pdv',
    apps: [
      {
        id: 'comandafacil',
        nome: 'ComandaFácil',
        desc: 'PDV, comandas e caixa',
        icon: '💳',
        classe: 'app-pdv',
        url: '/pdv/comandafacil.html'
      }
    ]
  },
  financeiro: {
    id: 'financeiro',
    nome: 'Módulo Financeiro',
    desc: 'Fluxo de caixa e relatórios',
    icon: '💰',
    classe: 'mod-financeiro',
    apps: [],
    em_breve: true
  },
  pessoal: {
    id: 'pessoal',
    nome: 'Módulo Pessoal',
    desc: 'Gestão de funcionários e escalas',
    icon: '👥',
    classe: 'mod-pessoal',
    apps: [],
    em_breve: true
  }
};

let currentUser = null;
let workspaceData = null;

async function _api(path) {
  const res = await fetch(SB_URL + '/rest/v1/' + path, {headers: H});
  return res.json();
}

async function _login() {
  const login = (document.getElementById('loginUser').value || '').trim().toLowerCase();
  const senha = document.getElementById('loginPass').value || '';
  const errEl = document.getElementById('loginError');
  errEl.style.display = 'none';

  if (!login || !senha) {
    errEl.textContent = 'Preencha usuário e senha.';
    errEl.style.display = 'block';
    return;
  }

  try {
    const users = await _api(`users?login=eq.${encodeURIComponent(login)}&select=*`);
    if (!Array.isArray(users) || !users.length) {
      errEl.textContent = 'Usuário não encontrado ❌';
      errEl.style.display = 'block';
      return;
    }
    const u = users[0];
    if (u.senha !== senha) {
      errEl.textContent = 'Senha incorreta ❌';
      errEl.style.display = 'block';
      return;
    }

    // Salva sessão Hub
    const sessao = {user: u, ts: Date.now()};
    localStorage.setItem('unilix_session', JSON.stringify(sessao));

    // SSO — salva no formato do ListaFácil e ComandaFácil
    // O workspace_id vem do banco após boot, mas salvamos o login agora
    // e o módulo vai revalidar
    sessionStorage.setItem('unilix_hub_login', u.login);
    sessionStorage.setItem('unilix_hub_user', JSON.stringify(u));

    currentUser = u;
    await _bootApp();
  } catch(e) {
    errEl.textContent = 'Erro de conexão. Tente novamente.';
    errEl.style.display = 'block';
  }
}

async function _bootApp() {
  // Busca workspace do banco LOCAL — limpa sessão anterior se workspace diferente
  try {
    const ws = await _api('workspaces?select=*&limit=1');
    if (Array.isArray(ws) && ws.length) {
      workspaceData = ws[0];
      // Se tinha workspace de outro cliente no localStorage, limpa
      const oldWs = localStorage.getItem('unilix_workspace_id');
      if (oldWs && oldWs !== workspaceData.id) {
        localStorage.removeItem('lf_workspace');
        localStorage.removeItem('lf_u_' + oldWs);
      }
      localStorage.setItem('unilix_workspace_id', workspaceData.id);
    }
  } catch(e) {}

  // SSO — salva login no formato que ListaFácil e ComandaFácil esperam
  if (workspaceData?.id) {
    // Sempre atualiza lf_workspace para o workspace deste cliente
    localStorage.setItem('lf_workspace', workspaceData.id);
    localStorage.setItem('lf_u_' + workspaceData.id, JSON.stringify({login: currentUser.login}));
    // ComandaFácil usa cf_user
    localStorage.setItem('cf_user', JSON.stringify({
      usuario: currentUser.login,
      nome: currentUser.nome,
      role: currentUser.role,
      workspace_id: workspaceData.id
    }));
  }

  // Update last seen
  try {
    await fetch(SB_URL + '/rest/v1/rpc/update_last_seen', {
      method: 'POST', headers: H,
      body: JSON.stringify({p_login: currentUser.login, p_workspace_id: workspaceData?.id})
    });
  } catch(e) {}

  // Mostra app
  document.getElementById('loginScreen').style.display = 'none';
  document.getElementById('appScreen').style.display = 'block';

  // Update UI
  const nome = currentUser.nome || currentUser.login;
  document.getElementById('userName').textContent = nome;
  document.getElementById('userAvatar').textContent = nome[0].toUpperCase();
  document.getElementById('greetingTitle').textContent = `Olá, ${nome.split(' ')[0]}! 👋`;
  document.getElementById('greetingDesc').textContent =
    workspaceData?.app_name ? `Bem-vindo ao ${workspaceData.app_name}` : 'Selecione um módulo para começar';

  _renderModulos();
}

function _renderModulos() {
  const grid = document.getElementById('modulosGrid');
  const modulosAtivos = workspaceData?.modulos || ['estoque'];
  const modulosUser = currentUser?.modulos_acesso || modulosAtivos;

  // Filtra módulos que o workspace tem E que o usuário tem acesso
  const modulos = modulosAtivos
    .filter(m => modulosUser.includes(m) || currentUser.role === 'superadmin')
    .map(m => MODULOS_DEF[m])
    .filter(Boolean);

  if (!modulos.length) {
    grid.innerHTML = '<div style="text-align:center;padding:40px;color:var(--muted)">Nenhum módulo disponível</div>';
    return;
  }

  grid.innerHTML = modulos.map(m => `
    <div class="modulo-card ${m.classe} fade-in">
      <div class="modulo-header">
        <div class="modulo-icon">${m.icon}</div>
        <div class="modulo-info">
          <h3>${m.nome}</h3>
          <p>${m.desc}</p>
        </div>
      </div>
      <div class="modulo-apps">
        ${m.apps.filter(app => !app.modulo_required || modulosAtivos.includes(app.modulo_required)).length ? m.apps.filter(app => !app.modulo_required || modulosAtivos.includes(app.modulo_required)).map(app => `
          <a class="app-btn ${app.classe || ''}" href="${app.em_breve ? '#' : app.url}"
            onclick="${app.em_breve ? "toast('Em breve!','ok');return false;" : `_abrirApp('${app.url}')`}">
            <div class="app-btn-icon">${app.icon}</div>
            <div class="app-btn-info">
              <div class="app-btn-name">${app.nome}${app.em_breve ? ' <span style="font-size:10px;background:rgba(91,94,244,0.15);color:#a5b4fc;padding:2px 7px;border-radius:4px;font-weight:700">EM BREVE</span>' : ''}</div>
              <div class="app-btn-desc">${app.desc}</div>
            </div>
            <span class="app-btn-arrow">→</span>
          </a>
        `).join('') : `<div style="padding:12px;text-align:center;font-size:0.8125rem;color:var(--muted)">Em desenvolvimento 🚧</div>`}
      </div>
    </div>
  `).join('');
}

function _abrirApp(url) {
  // Passa workspace via URL para garantir SSO
  if (workspaceData?.id) {
    localStorage.setItem('lf_workspace', workspaceData.id);
    localStorage.setItem('lf_u_' + workspaceData.id, JSON.stringify({login: currentUser?.login}));
    // Adiciona ?w= na URL para forçar o workspace correto
    const sep = url.includes('?') ? '&' : '?';
    url = url + sep + 'w=' + workspaceData.id;
  }
  window.location.href = url;
  return false;
}

function _sair() {
  if (!confirm('Deseja sair?')) return;
  localStorage.removeItem('unilix_session');
  sessionStorage.removeItem('unilix_session');
  location.reload();
}

function toast(msg, type) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'toast show ' + (type || 'ok');
  setTimeout(() => el.classList.remove('show'), 2500);
}

// Verifica sessão salva
(async function() {
  try {
    const raw = localStorage.getItem('unilix_session');
    if (!raw) return;
    const s = JSON.parse(raw);
    // Sessão expira em 7 dias
    if (Date.now() - s.ts > 7 * 24 * 60 * 60 * 1000) {
      localStorage.removeItem('unilix_session');
      return;
    }
    currentUser = s.user;
    await _bootApp();
  } catch(e) {}
})();
</script>
