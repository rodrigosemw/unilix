function modalLote(){
  const ol=document.createElement('div');ol.className='overlay';ol.id='olLote';
  ol.style.cssText='align-items:flex-start;padding:0;overflow-y:auto;overflow-x:hidden';
  ol.innerHTML=`<div style="width:100%;max-width:900px;min-height:100vh;background:var(--bg);display:flex;flex-direction:column;position:relative">
    <!-- Header fixo dentro do painel -->
    <div style="padding:16px 20px 0;flex-shrink:0;background:var(--bg);position:sticky;top:0;z-index:10;border-bottom:1px solid var(--border)">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;flex-wrap:wrap;gap:8px">
        <div>
          <div style="font-family:var(--display);font-size:18px;font-weight:900;letter-spacing:1px">📋 EDIÇÃO EM LOTE</div>
          <div style="font-size:12px;color:var(--muted);margin-top:2px">Edite estoque, preço e custo direto na tabela · Tab para avançar</div>
        </div>
        <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap">
          <span id="lote-status" style="font-size:12px;color:var(--muted)"></span>
          <button id="btnLoteSalvar" onclick="_loteSalvarTudo()" style="padding:9px 18px;background:var(--fire);border:none;border-radius:8px;color:#fff;font-weight:700;font-size:13px;cursor:pointer;font-family:var(--display)">💾 SALVAR ALTERAÇÕES</button>
          <button onclick="document.getElementById('olLote').remove()" style="padding:9px 14px;background:var(--s2);border:1px solid var(--border);border-radius:8px;color:var(--muted);cursor:pointer;font-size:13px">✕</button>
        </div>
      </div>
      <!-- Filtros de categoria -->
      <div style="display:flex;gap:6px;flex-wrap:wrap;padding-bottom:12px;overflow-x:auto" id="lote-cats">
        <button class="active" onclick="_loteFiltrarCat(this,'__todas__')" style="padding:5px 12px;border-radius:6px;border:1px solid var(--fire)66;background:var(--fire)22;color:var(--fire);cursor:pointer;font-size:11px;font-family:var(--font);white-space:nowrap">Todas</button>
        ${[...new Set(PRODS.map(p=>p.categoria))].map(cat=>
          `<button onclick="_loteFiltrarCat(this,'${esc(cat)}')" style="padding:5px 12px;border-radius:6px;border:1px solid var(--border);background:transparent;color:var(--muted);cursor:pointer;font-size:11px;font-family:var(--font);white-space:nowrap">${esc(cat)}</button>`
        ).join('')}
        <button onclick="_loteFiltrarCat(this,'__critico__')" style="padding:5px 12px;border-radius:6px;border:1px solid var(--red)44;background:transparent;color:var(--red);cursor:pointer;font-size:11px;font-family:var(--font);white-space:nowrap">⚠️ Crítico</button>
      </div>
    </div>
    <!-- Tabela — sem scroll próprio, rola com o overlay -->
    <div style="padding:0 20px 40px">
      <div id="lote-body"></div>
    </div>
  </div>`;
  document.body.appendChild(ol);
  document.body.style.overflow='hidden'; // já estava, garante
  ol.addEventListener('click',e=>{if(e.target===ol)ol.remove();});
  // Garante scroll no overlay mesmo com body overflow:hidden
  ol.style.overflowY='scroll';
  ol.style.webkitOverflowScrolling='touch';
  _loteRender('__todas__');
}

let _loteChanges={}; // {prodId: {estoque, preco, custo}}

function _loteRender(filtro){

  else if(filtro!=='__todas__') prods=PRODS.filter(p=>p.categoria===filtro);

  if(isMobile){
    // ── Layout mobile: cards empilhados ──

      }

      const m=p.preco>0&&p.custo>=0?Math.round((p.preco-p.custo)/p.preco*100):null;

        <div style="display:flex;align-items:center;gap:8px;margin-bottom:10px">

          <span style="font-weight:700;font-size:14px;flex:1">${esc(p.nome)}</span>
          ${critico?`<span style="font-size:10px;padding:2px 6px;border-radius:4px;background:var(--red)22;color:var(--red);border:1px solid var(--red)44">⚠️</span>`:''}
          <span id="lote-m-${p.id}" style="font-family:var(--display);font-size:14px;font-weight:800;color:${mCor}">${m===null?'—':m+'%'}</span>
        </div>
        <!-- Inputs em grid 3 colunas -->
        <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px">
          <div>
            <div style="font-size:10px;color:var(--muted);margin-bottom:3px;text-transform:uppercase;font-family:var(--display)">Estoque</div>
            <input class="lote-inp" id="lote-est-${p.id}" type="number" inputmode="numeric" min="0" step="1"
              value="${p.estoque}" data-orig="${p.estoque}" data-prod="${p.id}" data-field="estoque"
              oninput="_loteChange(this)" style="text-align:center;font-size:18px;font-weight:800;padding:8px 4px">
            <div style="font-size:10px;color:var(--muted);text-align:center;margin-top:2px">${esc(p.unidade||'un')}</div>
          </div>
          <div>
            <div style="font-size:10px;color:var(--muted);margin-bottom:3px;text-transform:uppercase;font-family:var(--display)">Preço R$</div>
            <input class="lote-inp" id="lote-pre-${p.id}" type="number" inputmode="decimal" min="0" step="0.01"
              value="${p.preco}" data-orig="${p.preco}" data-prod="${p.id}" data-field="preco"
              oninput="_loteChange(this)" style="text-align:center">
            <div style="font-size:10px;color:var(--muted);text-align:center;margin-top:2px">venda</div>
          </div>
          <div>
            <div style="font-size:10px;color:var(--muted);margin-bottom:3px;text-transform:uppercase;font-family:var(--display)">Custo R$</div>
            <input class="lote-inp" id="lote-cus-${p.id}" type="number" inputmode="decimal" min="0" step="0.01"

              oninput="_loteChange(this)" style="text-align:center">
            <div style="font-size:10px;color:var(--muted);text-align:center;margin-top:2px">custo</div>

      +'<th style="min-width:95px;text-align:right">Custo R$</th>'

    document.getElementById('lote-body').innerHTML=html;
  }

}

function _loteChange(inp){
  const prodId=inp.dataset.prod;
  const field=inp.dataset.field;
  const orig=parseFloat(inp.dataset.orig)||0;
  const novo=parseFloat(inp.value)||0;
  if(!_loteChanges[prodId])_loteChanges[prodId]={};
  if(novo!==orig){
    inp.classList.add('changed');inp.classList.remove('saved');
    _loteChanges[prodId][field]=novo;
  } else {
    inp.classList.remove('changed');
    delete _loteChanges[prodId][field];
    if(!Object.keys(_loteChanges[prodId]).length)delete _loteChanges[prodId];
  }
  // Atualiza margem e valor em estoque ao vivo
  const p=PRODS.find(x=>x.id===prodId);
  const precoEl=document.getElementById('lote-pre-'+prodId);
  const custoEl=document.getElementById('lote-cus-'+prodId);
  const estEl=document.getElementById('lote-est-'+prodId);
  if(p&&precoEl&&custoEl&&estEl){
    const pre=parseFloat(precoEl.value)||p.preco;
    const cus=parseFloat(custoEl.value)||0;
    const est=parseFloat(estEl.value)||0;
    const m=pre>0?Math.round((pre-cus)/pre*100):null;
    const mEl=document.getElementById('lote-m-'+prodId);
    const veEl=document.getElementById('lote-ve-'+prodId);
    if(mEl) mEl.textContent=m===null?'—':m+'%';
    if(mEl) mEl.style.color=m===null?'var(--muted)':m>50?'var(--green)':m>25?'var(--ember)':'var(--red)';
    if(veEl) veEl.textContent='R$ '+fmtR(pre*est);
  }
  // Marca linha
  const row=document.getElementById('lote-row-'+prodId);
  if(row) row.classList.toggle('lote-changed',!!_loteChanges[prodId]);
  _loteAtualizarStatus();
}

function _loteNav(e,inp){
  // Tab avança para próximo input na mesma coluna; Enter salva e avança
  if(e.key==='Enter'){e.preventDefault();_loteSalvarTudo();return;}

async function _loteSalvarTudo(){
  const ids=Object.keys(_loteChanges);
  if(!ids.length){toast('Nenhuma alteração para salvar','err');return;}
  const btn=document.getElementById('btnLoteSalvar');
  if(btn){btn.disabled=true;btn.textContent='⏳ Salvando…';}
  const now=new Date().toISOString();
  let ok=0,err=0;
  for(const prodId of ids){
    const changes=_loteChanges[prodId];
    const p=PRODS.find(x=>x.id===prodId);if(!p)continue;
    const upd={updated_at:now};
    if(changes.estoque!==undefined)upd.estoque=changes.estoque;
    if(changes.preco!==undefined)upd.preco=changes.preco;
    if(changes.custo!==undefined)upd.custo=changes.custo;
    const {error}=await sb.from('pdv_produtos').update(upd).eq('id',prodId);
    if(error){err++;console.error(prodId,error);}
    else{
      // Atualiza memória
      if(changes.estoque!==undefined)p.estoque=changes.estoque;
      if(changes.preco!==undefined)p.preco=changes.preco;
      if(changes.custo!==undefined)p.custo=changes.custo;
      // Visual: marca como salvo
      ['est','pre','cus'].forEach(f=>{
        const el=document.getElementById(`lote-${f}-${prodId}`);
        if(el){el.classList.remove('changed');el.classList.add('saved');el.dataset.orig=el.value;}
      });
      const row=document.getElementById('lote-row-'+prodId);
      if(row){row.classList.remove('lote-changed');row.classList.add('lote-saved');}
      delete _loteChanges[prodId];
      ok++;
    }
  }
  if(btn){btn.disabled=false;btn.textContent='💾 SALVAR ALTERAÇÕES';}
  if(err) toast(`${ok} salvo(s), ${err} erro(s)`,'err');
  else toast(`✅ ${ok} produto(s) atualizados!`,'ok');
  _loteAtualizarStatus();
  // Atualiza telas dependentes
  renderProdScreen();renderGrid();renderCatStrip();renderDashboard();
}

// Redimensiona imagem para caber em maxW x maxH mantendo proporção (object-contain)
// Retorna um Blob JPEG comprimido
function _redimensionarFoto(file, maxW=600, maxH=600, qualidade=0.88){
  return new Promise((resolve,reject)=>{
    const img=new Image();
    const url=URL.createObjectURL(file);
    img.onload=()=>{
      URL.revokeObjectURL(url);
      let {naturalWidth:w,naturalHeight:h}=img;
      // Calcula escala para caber em maxW x maxH sem cortar
      const escala=Math.min(1, maxW/w, maxH/h);
      const nw=Math.round(w*escala);
      const nh=Math.round(h*escala);
      const canvas=document.createElement('canvas');
      canvas.width=nw; canvas.height=nh;
      const ctx=canvas.getContext('2d');
      // Fundo branco para imagens com transparência
      ctx.fillStyle='#1a1a1a';
      ctx.fillRect(0,0,nw,nh);
      ctx.drawImage(img,0,0,nw,nh);
      canvas.toBlob(blob=>{
        if(blob)resolve(blob);
        else reject(new Error('toBlob falhou'));
      },'image/jpeg',qualidade);
    };
    img.onerror=()=>{URL.revokeObjectURL(url);reject(new Error('Imagem inválida'));};
    img.src=url;
  });
}

async function _uploadFoto(prodId){
  const fi=document.getElementById('pFotoFile');
  if(!fi||!fi.files?.length)return null;
  const file=fi.files[0];
  toast('🖼 Processando imagem…','info');
  let blob;
  try{
    blob=await _redimensionarFoto(file,600,600,0.88);
  }catch(e){
    console.warn('Resize falhou, usando original:',e);
    blob=file;
  }
  const path=`produtos/${prodId}.jpg`;
  toast('📤 Enviando foto…','info');
  // Remove versões anteriores em todos os formatos
  await sb.storage.from('pdv-fotos').remove([`produtos/${prodId}.jpg`,`produtos/${prodId}.png`,`produtos/${prodId}.webp`,`produtos/${prodId}.jpeg`]).catch(()=>{});
  const {error}=await sb.storage.from('pdv-fotos').upload(path,blob,{upsert:true,contentType:'image/jpeg'});
  if(error){
    toast('Erro no upload: '+error.message,'err');
    console.error('Upload erro:',error);
    return null;
  }
  const {data}=sb.storage.from('pdv-fotos').getPublicUrl(path);
  const url=(data?.publicUrl||null);
  if(url) return url+'?t='+Date.now();
  return null;
}
async function _salvarProd(id){
  const nome=(document.getElementById('pNome')?.value||'').trim();

    cat=(prompt('Nome da nova categoria:')||'').trim();
    if(!cat){toast('Categoria obrigatória','err');return;}
  }
  const emoji=(document.getElementById('pEmoji')?.value||'🍢').trim();
  const preco=parseFloat(document.getElementById('pPreco')?.value)||0;
  const custoVal=document.getElementById('pCusto')?.value;
  const prodAtual=id?PRODS.find(x=>x.id===id):null;
  const custo=custoVal!==''?(parseFloat(custoVal)||0):(prodAtual?.custo||0);
  const est=parseInt(document.getElementById('pEst')?.value)||0;
  const estMin=parseInt(document.getElementById('pEstMin')?.value)??5;
  const unid=(document.getElementById('pUnid')?.value||'un').trim();
  // pFoto hidden: valor real da URL, ou '' se removida, ou '__upload__' se há arquivo pendente
  const fotoHidden=(document.getElementById('pFoto')?.value||'').trim();
  if(!nome||!cat){toast('Nome e categoria obrigatórios','err');return;}
  const prodId=id||('prod'+uid());
  // Faz upload se tiver arquivo selecionado
  const uploadUrl=await _uploadFoto(prodId);
  let foto;
  if(uploadUrl){
    // Upload feito com sucesso
    foto=uploadUrl;
  } else if(fotoHidden===''||fotoHidden==='__upload__'){
    // Removeu a foto ou upload falhou — mantém a anterior se existir
    foto=prodAtual?.foto_url||'';
  } else {
    foto=fotoHidden;
  }
  const data={nome,categoria:cat,emoji,preco,custo,estoque:est,estoque_minimo:estMin,unidade:unid,foto_url:foto||null,ativo:true,updated_at:new Date().toISOString()};
  if(id){
    const {error}=await sb.from('pdv_produtos').update(data).eq('id',id);
    if(error){toast('Erro ao salvar: '+error.message,'err');return;}
    const i=PRODS.findIndex(x=>x.id===id);if(i>=0)PRODS[i]={...PRODS[i],...data};
    toast('Produto atualizado ✅','ok');
  }else{
    data.id=prodId;
    const {data:d,error}=await sb.from('pdv_produtos').insert(data).select().single();
    if(error){toast('Erro ao salvar: '+error.message,'err');return;}
    PRODS.push(d);toast('Produto cadastrado ✅','ok');
  }
  document.getElementById('olProd')?.remove();
  renderGrid();renderCatStrip();renderProdScreen();
}

function _estqUnitToTotal(){
  const qtd=parseFloat(document.getElementById('estqQtd')?.value)||0;
  const unit=parseFloat(document.getElementById('estqUnit')?.value)||0;
  if(qtd>0&&unit>0){
    const tot=qtd*unit;
    const el=document.getElementById('estqPreco');
    if(el&&document.activeElement!==el) el.value=tot.toFixed(2);
  }
  _calcCustoMedio();
}
function _estqTotalToUnit(){
  const qtd=parseFloat(document.getElementById('estqQtd')?.value)||0;
  const tot=parseFloat(document.getElementById('estqPreco')?.value)||0;
  if(qtd>0&&tot>0){
    const unit=tot/qtd;
    const el=document.getElementById('estqUnit');
    if(el&&document.activeElement!==el) el.value=unit.toFixed(4);
  }
  _calcCustoMedio();
}
function _calcCustoMedio(){
  const qtd=parseFloat(document.getElementById('estqQtd')?.value)||0;
  const tot=parseFloat(document.getElementById('estqPreco')?.value)||0;
  const unit=parseFloat(document.getElementById('estqUnit')?.value)||0;
  const total=tot||(qtd*unit);
  const prev=document.getElementById('previewCusto');
  if(!prev)return;
  if(qtd<=0){prev.style.display='none';return;}
  const p=_estqGetProd();if(!p)return;
  const custUnit=qtd>0?(total/qtd):0;
  const novoEstq=p.estoque+qtd;
  const novoMedio=novoEstq>0?((p.estoque*p.custo)+(qtd*custUnit))/novoEstq:custUnit;
  document.getElementById('prevCustUnit').textContent='R$ '+fmtR(custUnit);
  document.getElementById('prevEstq').textContent=novoEstq+' '+p.unidade;
  document.getElementById('prevCustoMedio').textContent='R$ '+fmtR(novoMedio);
  prev.style.display='block';
  // Sincroniza campos se qtd mudou
  if(document.activeElement===document.getElementById('estqQtd')){
    if(unit>0){const el=document.getElementById('estqPreco');if(el)el.value=(qtd*unit).toFixed(2);}
    else if(tot>0){const el=document.getElementById('estqUnit');if(el)el.value=(tot/qtd).toFixed(4);}
  }
}

        <button onclick="_novaCat()" style="padding:6px 14px;border-radius:6px;border:none;background:var(--fire);color:#fff;cursor:pointer;font-size:13px;font-family:var(--display);font-weight:800">＋</button>

async function _renomearCat(orig){
  const key='cat_'+btoa(orig).replace(/=/g,'');
  const el=document.getElementById(key);if(!el)return;
  const novo=el.value.trim();
  if(!novo||novo===orig){toast('Digite um nome diferente','err');return;}
  // Atualiza todos os produtos da categoria
  const ps=PRODS.filter(p=>p.categoria===orig);
  for(const p of ps){
    p.categoria=novo;
    await sb.from('pdv_produtos').update({categoria:novo}).eq('id',p.id);
  }
  toast(`Categoria "${orig}" → "${novo}" (${ps.length} produto(s)) ✅`,'ok');
  document.getElementById('olCat')?.remove();
  renderProdScreen();renderCatStrip();
}
async function _novaCat(){
  const nome=(document.getElementById('novaCatNome')?.value||'').trim();
  if(!nome){toast('Digite o nome da categoria','err');return;}
  if(PRODS.some(p=>p.categoria.toLowerCase()===nome.toLowerCase())){toast('Categoria já existe','err');return;}
  // Cria produto placeholder para garantir que a categoria apareça
  toast('Categoria criada — cadastre um produto nela ✅','ok');
  document.getElementById('olCat')?.remove();
  // Abre modal de novo produto já com categoria preenchida
  modalProduto(null);
  setTimeout(()=>{const el=document.getElementById('pCat');if(el)el.value=nome;},80);
}

async function _salvarCli(id){
  const nomeRaw=(document.getElementById('cNome')?.value||'').trim();
  if(!nomeRaw){toast('Informe o nome','err');return;}
  const nome=nomeRaw.replace(/\b\w/g,l=>l.toUpperCase());
  // Duplicata case-insensitive
  if(!id){
    const dup=CLIS.find(c=>c.nome.toLowerCase()===nomeRaw.toLowerCase());
    if(dup){toast(`Já existe como "${dup.nome}"  — use o existente`,'err');return;}
  }
  const data={nome,telefone:document.getElementById('cTel')?.value||'',email:document.getElementById('cEmail')?.value||'',obs:document.getElementById('cObs')?.value||'',updated_at:new Date().toISOString()};
  if(id){
    await sb.from('pdv_clientes').update(data).eq('id',id);
    const i=CLIS.findIndex(c=>c.id===id);if(i>=0)CLIS[i]={...CLIS[i],...data};
    toast('Cliente atualizado!','ok');
  }else{
    data.id='cli'+uid();
    const {data:d,error}=await sb.from('pdv_clientes').insert(data).select().single();
    if(error){toast('Erro ao salvar','err');return;}
    CLIS.push(d);toast('Cliente cadastrado!','ok');
  }
  document.getElementById('olCli')?.remove();renderCliScreen();
}

async function _excluirCliente(id,nome){
  if(!confirm(`Excluir cliente "${nome}"?
Histórico de comandas será mantido.`))return;
  const {error}=await sb.from('pdv_clientes').delete().eq('id',id);
  if(error){toast('Erro ao excluir: '+error.message,'err');return;}
  CLIS=CLIS.filter(c=>c.id!==id);
  toast(`Cliente "${nome}" excluído`,'ok');
  renderCliScreen();
}

function _parseLocalDate(s){if(!s)return new Date(0);const[y,m,d]=s.split('-').map(Number);return new Date(y,m-1,d);}

  const totalFat=cmds.reduce((a,c)=>a+Number(c.total),0);

      <div>
        <div style="font-family:var(--display);font-size:16px;font-weight:700;color:var(--muted);letter-spacing:1px;text-transform:uppercase;margin-bottom:10px;border-left:3px solid var(--fire);padding-left:8px">Top Produtos</div>
        ${rank.map((p,i)=>`<div style="display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--border)33">
          <span style="font-family:var(--display);font-size:18px;font-weight:800;color:var(--fire);min-width:26px">${i+1}</span>
          <span style="flex:1;font-size:13px">${esc(p.nome)}</span>
          <span style="font-size:12px;color:var(--muted)">${p.qty}×</span>
          <span style="font-family:var(--display);font-size:15px;font-weight:700;color:var(--green)">R$ ${fmtR(p.total)}</span>
        </div>`).join('')||'<div style="color:var(--muted);font-size:13px;padding:12px 0">Sem dados no período</div>'}
      </div>
      <div>
        <div style="font-family:var(--display);font-size:16px;font-weight:700;color:var(--muted);letter-spacing:1px;text-transform:uppercase;margin-bottom:10px;border-left:3px solid var(--ember);padding-left:8px">Pagamentos</div>
        ${Object.entries(pags).map(([p,v])=>`<div style="display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--border)33;font-size:13px"><span>${esc(p)}</span><span style="font-family:var(--display);font-size:16px;font-weight:700;color:var(--ember)">R$ ${fmtR(v)}</span></div>`).join('')||'<div style="color:var(--muted);font-size:13px;padding:12px 0">Sem dados</div>'}

/* ════ CAIXA ════ */
function renderCaixa(){
  const el=document.getElementById('caixaContent');if(!el)return;
  const dataStr=document.getElementById('caixaData')?.value;
  const dia=dataStr?_parseLocalDate(dataStr):new Date();
  dia.setHours(0,0,0,0);
  const fimDia=new Date(dia);fimDia.setHours(23,59,59,999);

  const fechadas=CMDS.filter(c=>{
    if(c.status!=='fechada')return false;
    const dt=new Date(c.fechada_em||c.updated_at||c.aberta_em);
    return dt>=dia&&dt<=fimDia;
  });
  const canceladas=CMDS.filter(c=>{
    if(c.status!=='cancelada')return false;
    const dt=new Date(c.updated_at||c.aberta_em);
    return dt>=dia&&dt<=fimDia;
  });

  // Agrupa por forma de pagamento
  const pags={};
  fechadas.forEach(c=>{
    const p=c.pagamento||'Outros';
    if(!pags[p])pags[p]={total:0,qtd:0,cmds:[]};
    pags[p].total+=Number(c.total);
    pags[p].qtd++;
    pags[p].cmds.push(c);
  });
  const totalGeral=fechadas.reduce((a,c)=>a+Number(c.total),0);
  const ticketMed=fechadas.length?totalGeral/fechadas.length:0;

  const dtLabel=dia.toLocaleDateString('pt-BR',{weekday:'long',day:'2-digit',month:'long',year:'numeric'});

  el.innerHTML=`
    <div style="margin-bottom:20px">
      <div style="font-size:13px;color:var(--muted);margin-bottom:12px;text-transform:capitalize">${dtLabel}</div>

      <!-- Cards resumo -->
      <div class="rel-cards" style="margin-bottom:20px">
        <div class="rel-card"><div class="rel-card-label">💰 Total do dia</div><div class="rel-card-value" style="color:var(--fire)">R$ ${fmtR(totalGeral)}</div></div>
        <div class="rel-card" style="cursor:pointer" onclick="nav('comandas');setFlt('fechada')"><div class="rel-card-label">🧾 Comandas fechadas</div><div class="rel-card-value">${fechadas.length}</div><div style="font-size:10px;color:var(--muted);margin-top:2px">ver lista →</div></div>
        <div class="rel-card"><div class="rel-card-label">🎫 Ticket médio</div><div class="rel-card-value" style="color:var(--green)">R$ ${fmtR(ticketMed)}</div></div>
        <div class="rel-card"><div class="rel-card-label">🗑 Canceladas</div><div class="rel-card-value" style="color:var(--red)">${canceladas.length}</div></div>
      </div>

      <!-- Por forma de pagamento -->
      <div style="font-family:var(--display);font-size:16px;font-weight:700;color:var(--muted);letter-spacing:1px;text-transform:uppercase;margin-bottom:12px;border-left:3px solid var(--fire);padding-left:8px">Recebimentos por Forma de Pagamento</div>
      ${Object.keys(pags).length?`
        <div style="display:grid;gap:10px;margin-bottom:20px">
          ${Object.entries(pags).sort((a,b)=>b[1].total-a[1].total).map(([pag,d])=>`
            <div style="background:var(--s2);border:1px solid var(--border);border-radius:12px;padding:14px 16px;display:flex;align-items:center;justify-content:space-between">
              <div>
                <div style="font-family:var(--display);font-size:18px;font-weight:800">${esc(pag)}</div>
                <div style="font-size:12px;color:var(--muted);margin-top:2px">${d.qtd} comanda${d.qtd>1?'s':''}</div>
              </div>
              <div style="font-family:var(--display);font-size:28px;font-weight:900;color:var(--fire)">R$ ${fmtR(d.total)}</div>
            </div>`).join('')}
        </div>
        <!-- Barra visual das formas de pagamento -->
        <div style="height:12px;border-radius:6px;overflow:hidden;display:flex;margin-bottom:20px">
          ${Object.entries(pags).sort((a,b)=>b[1].total-a[1].total).map(([pag,d],i)=>{
            const pct=totalGeral>0?Math.round(d.total/totalGeral*100):0;
            const cores=['var(--fire)','var(--green)','var(--blue)','var(--ember)','#9c7cf5'];
            return `<div style="flex:${pct};background:${cores[i%cores.length]};min-width:${pct>0?'4px':'0'}" title="${pag}: ${pct}%"></div>`;
          }).join('')}
        </div>`
      :'<div style="text-align:center;padding:32px;color:var(--muted)">Nenhuma comanda fechada nesta data</div>'}

      <!-- Lista de comandas do dia -->
      ${fechadas.length?`
        <div style="font-family:var(--display);font-size:16px;font-weight:700;color:var(--muted);letter-spacing:1px;text-transform:uppercase;margin-bottom:10px;border-left:3px solid var(--ember);padding-left:8px">Comandas Fechadas</div>
        <table class="tbl"><thead><tr><th>Cliente</th><th>Fechamento</th><th>Fechado por</th><th>Pagamento</th><th style="text-align:right">Total</th></tr></thead>
        <tbody>${fechadas.sort((a,b)=>new Date(b.fechada_em||0)-new Date(a.fechada_em||0)).map(c=>`
          <tr>
            <td><strong>${esc(c.cliente_nome)}</strong>${c.numero?' <span style="color:var(--ember);font-size:11px">#'+c.numero+'</span>':''}</td>
            <td style="color:var(--muted);font-size:12px">${c.fechada_em?new Date(c.fechada_em).toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'}):'—'}</td>
            <td style="font-size:12px">${esc(c.fechada_por||'—')}</td>
            <td><span class="pill pill-fire" style="font-size:11px">${esc(c.pagamento||'—')}</span></td>
            <td style="text-align:right;font-family:var(--display);font-size:16px;font-weight:800;color:var(--fire)">R$ ${fmtR(c.total)}</td>
          </tr>`).join('')}
        </tbody></table>`:''}

      <!-- Canceladas -->
      ${canceladas.length?`
        <div style="font-family:var(--display);font-size:16px;font-weight:700;color:var(--red);letter-spacing:1px;text-transform:uppercase;margin:20px 0 10px;border-left:3px solid var(--red);padding-left:8px">Canceladas</div>
        ${canceladas.map(c=>{
          let por=c.fechada_por||'';
          if(!por&&c.pagamento&&c.pagamento.startsWith('CANCELADO||'))por=c.pagamento.replace('CANCELADO||','').replace(/[()]/g,'');
          return `<div class="hist-card" style="opacity:.8;border-color:var(--red)33">
            <div style="display:flex;justify-content:space-between;align-items:center">
              <div><strong>${esc(c.cliente_nome)}</strong>${c.numero?' <span style="color:var(--ember);font-size:11px">#'+c.numero+'</span>':''}
                <div style="font-size:11px;color:var(--muted);margin-top:2px">${por?'por '+esc(por):''}</div>
              </div>
              <span style="font-family:var(--display);font-size:18px;color:var(--red)">R$ ${fmtR(c.total)}</span>
            </div>
          </div>`;}).join('')}`:''}
    </div>`;
}

      <td><span style="margin-right:6px">${esc(u.emoji||'👤')}</span>${esc(u.nome)}</td>
      <td style="color:var(--muted)">${esc(u.usuario||u.login||'')}</td>
      <td><span class="pill ${u.role==='admin'||u.role==='administrador'?'pill-fire':'pill-blue'}">${esc(u.role)}</span></td>
      <td style="white-space:nowrap;display:flex;gap:4px">
        <button onclick="modalFuncionario('${u.id}')" style="background:var(--s3);border:1px solid var(--border);border-radius:6px;padding:4px 9px;cursor:pointer;font-size:12px;color:var(--text);font-family:var(--font)">✏️</button>
        <button onclick="_excluirFunc('${u.id}','${esc(u.nome)}')" style="background:var(--red)22;border:1px solid var(--red)44;border-radius:6px;padding:4px 9px;cursor:pointer;font-size:12px;color:var(--red);font-family:var(--font)">🗑</button>
      </td>
    </tr>`).join('')}

}
function modalFuncionario(id){
  const u=id?USERS.find(x=>x.id===id):null;
  const ol=document.createElement('div');ol.className='overlay';ol.id='olFunc';
  ol.innerHTML=`<div class="modal">
    <div class="modal-title">${u?'Editar':'Novo'} Funcionário</div>
    <div class="fgrp"><label class="flabel">Nome completo</label><input id="fNome" class="finput" value="${esc(u?.nome||'')}" placeholder="Nome…"></div>
    <div class="frow fcols2">
      <div class="fgrp"><label class="flabel">Usuário (login)</label><input id="fUser" class="finput" value="${esc(u?.usuario||u?.login||'')}" placeholder="joao"></div>
      <div class="fgrp"><label class="flabel">Senha</label><input id="fSenha" class="finput" type="password" value="${esc(u?.senha||'')}" placeholder="${u?'deixe em branco p/ manter':'nova senha'}"></div>
    </div>
    <div class="fgrp"><label class="flabel">Cargo</label>
      <select id="fRole" class="finput">
        <option value="atendente" ${(!u||u.role==='atendente')?'selected':''}>Atendente</option>
        <option value="churrasqueiro" ${u?.role==='churrasqueiro'?'selected':''}>Churrasqueiro</option>
        <option value="admin" ${u?.role==='admin'||u?.role==='administrador'?'selected':''}>Admin</option>
      </select>
    </div>
    <div class="modal-btns">
      <button class="btn-cancel" onclick="document.getElementById('olFunc').remove()">Cancelar</button>
      <button class="btn-save" onclick="_salvarFunc('${id||''}')">${u?'SALVAR':'CADASTRAR'}</button>
    </div>
  </div>`;
  document.body.appendChild(ol);ol.addEventListener('click',e=>{if(e.target===ol)ol.remove();});
}
async function _salvarFunc(id){
  const nome=(document.getElementById('fNome')?.value||'').trim();
  const usuario=(document.getElementById('fUser')?.value||'').trim().toLowerCase();
  const senha=(document.getElementById('fSenha')?.value||'').trim();
  const role=document.getElementById('fRole')?.value||'atendente';
  if(!nome||!usuario){toast('Nome e usuário obrigatórios','err');return;}
  const data={nome,usuario,role};
  if(senha)data.senha=senha;
  if(id){
    const {error}=await sb.from('pdv_usuarios').update(data).eq('id',id);
    if(error){toast('Erro ao salvar: '+error.message,'err');console.error(error);return;}
    const i=USERS.findIndex(x=>x.id===id);
    if(i>=0)USERS[i]={...USERS[i],...data};
    toast('Funcionário atualizado ✅','ok');
  }else{
    data.id='usr_'+uid();
    const {data:d,error}=await sb.from('pdv_usuarios').insert(data).select().single();
    if(error){toast('Erro ao cadastrar: '+error.message,'err');console.error(error);return;}
    USERS.push(d);toast('Funcionário cadastrado ✅','ok');
  }
  document.getElementById('olFunc')?.remove();renderFuncScreen();
}
async function _excluirFunc(id,nome){
  if(id===currentUser?.id){toast('Não pode excluir a si mesmo','err');return;}
  if(!confirm(`Excluir funcionário "${nome}"?`))return;
  const {error}=await sb.from('pdv_usuarios').delete().eq('id',id);
  if(error){toast('Erro: '+error.message,'err');return;}
  USERS=USERS.filter(u=>u.id!==id);
  toast(`"${nome}" removido`,'ok');renderFuncScreen();
}

/* ════ CHURRASCO ════ */
function _churrKey(cmdId,prodId){return cmdId+'_'+prodId;}
function renderChurrascoScreen(){
  const el=document.getElementById('churrContent');if(!el)return;
  const catChurr=['grelhados','churrasco','espetinho','churrascos','espeto']; // legado
  const abertas=CMDS.filter(c=>c.status==='aberta'||c.status==='pag_solicitado');
  let pedidos=[];
  abertas.forEach(cmd=>{
    const its=itensDe(cmd.id).filter(i=>{
      const prod=PRODS.find(p=>p.id===i.produto_id);
      return prod&&catChurr.some(cat=>prod.categoria.toLowerCase().includes(cat));
    });
    if(its.length) pedidos.push({cmd,its});
  });
  if(!pedidos.length){
    el.innerHTML=`<div style="text-align:center;padding:60px 20px">
      <div style="font-size:48px;margin-bottom:12px">🔥</div>
      <div style="color:var(--muted);font-size:16px">Nenhum pedido de churrasco no momento</div>
    </div>`;return;
  }
  el.innerHTML=pedidos.map(({cmd,its})=>{
    const hora=cmd.aberta_em?new Date(cmd.aberta_em).toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'}):'';
    const itensHtml=its.map(i=>{
      // Agrupa por produto
      const grp={};
      itensDe(cmd.id).filter(x=>x.produto_id===i.produto_id).forEach(x=>{
        if(!grp[x.produto_id]){grp[x.produto_id]={...x,qty:0};}
        grp[x.produto_id].qty+=Number(x.qty);
      });
      const g=grp[i.produto_id];if(!g)return '';
      const key=_churrKey(cmd.id,i.produto_id);
      const st=_churrStatus[key];
      if(st==='pronto') return `<div style="display:flex;align-items:center;gap:10px;padding:8px 0;border-top:1px solid var(--border)33;opacity:.5">
        <span style="font-size:22px">${esc(g.emoji||'🍢')}</span>
        <span style="flex:1;font-size:14px;text-decoration:line-through;color:var(--muted)">${esc(g.produto_nome)}</span>
        <span style="font-size:11px;background:var(--green)22;color:var(--green);border-radius:6px;padding:3px 8px;font-weight:700">✅ Pronto</span>
      </div>`;
      if(st&&st.cancelado) return `<div style="display:flex;align-items:center;gap:10px;padding:8px 0;border-top:1px solid var(--border)33;opacity:.5">
        <span style="font-size:22px">${esc(g.emoji||'🍢')}</span>
        <span style="flex:1;font-size:14px;text-decoration:line-through;color:var(--muted)">${esc(g.produto_nome)}</span>
        <span style="font-size:11px;background:var(--red)22;color:var(--red);border-radius:6px;padding:3px 8px;font-weight:700">✕ ${esc(st.motivo)}</span>
      </div>`;
      return `<div style="display:flex;align-items:center;gap:10px;padding:8px 0;border-top:1px solid var(--border)33">
        <span style="font-size:24px">${esc(g.emoji||'🍢')}</span>
        <div style="flex:1">
          <div style="font-size:15px;font-weight:600">${esc(g.produto_nome)}</div>
          ${g.para_levar?'<span style="font-size:11px;background:var(--blue)22;color:var(--blue);border-radius:4px;padding:2px 6px">🛍 para levar</span>':''}
        </div>
        <span style="font-family:var(--display);font-size:24px;font-weight:900;color:var(--fire);margin-right:4px">${g.qty}×</span>
        <div style="display:flex;flex-direction:column;gap:4px">
          <button onclick="_churrPronto('${cmd.id}','${i.produto_id}')" style="padding:5px 10px;border-radius:6px;border:none;background:var(--green);color:#fff;font-family:var(--display);font-size:12px;font-weight:700;cursor:pointer">✅ Pronto</button>
          <button onclick="_churrCancelar('${cmd.id}','${i.produto_id}')" style="padding:5px 10px;border-radius:6px;border:1px solid var(--red)55;background:var(--red)22;color:var(--red);font-family:var(--display);font-size:12px;font-weight:700;cursor:pointer">✕ Cancelar</button>
        </div>
      </div>`;
    }).join('');
    return `<div style="background:var(--s2);border:2px solid var(--fire)44;border-radius:14px;padding:16px;margin-bottom:14px">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px">
        <div>
          <span style="font-family:var(--display);font-size:22px;font-weight:800">${esc(cmd.cliente_nome)}</span>
          ${cmd.numero?`<span style="color:var(--ember);margin-left:8px;font-family:var(--display);font-size:18px">#${cmd.numero}</span>`:''}
          ${cmd.obs?`<div style="font-size:12px;color:var(--ember);margin-top:2px">📝 ${esc(cmd.obs)}</div>`:''}
        </div>
        <div style="color:var(--muted);font-size:12px">${hora}</div>
      </div>
      ${itensHtml}
    </div>`;
  }).join('');
}
function _churrPronto(cmdId,prodId){
  const key=_churrKey(cmdId,prodId);
  _churrStatus[key]='pronto';
  toast('✅ Marcado como pronto!','ok');
  renderChurrascoScreen();
}
function _churrCancelar(cmdId,prodId){
  const motivos=['Sem estoque','Cliente cancelou','Produto em falta','Outro'];
  const ol=document.createElement('div');ol.className='overlay';ol.id='olChurrCanc';
  ol.innerHTML=`<div class="modal" style="max-width:360px">
    <div class="modal-title" style="color:var(--red)">✕ Cancelar item</div>
    <div class="modal-sub">Selecione o motivo</div>
    <div style="display:flex;flex-direction:column;gap:8px;margin-bottom:14px">
      ${motivos.map(m=>`<button onclick="_churrConfirmCanc('${cmdId}','${prodId}','${m}')"
        style="padding:12px 16px;border-radius:8px;border:1px solid var(--border);background:var(--s2);color:var(--text);font-size:14px;font-weight:600;cursor:pointer;text-align:left"
        onmouseover="this.style.background='var(--red)22'" onmouseout="this.style.background='var(--s2)'">${m}</button>`).join('')}
    </div>
    <div class="fgrp"><label class="flabel">Outro motivo</label>
      <input id="churrMotivoCustom" class="finput" placeholder="Descreva…">
    </div>
    <div class="modal-btns">
      <button class="btn-cancel" onclick="document.getElementById('olChurrCanc').remove()">Voltar</button>
      <button class="btn-save" style="background:var(--red)" onclick="_churrConfirmCanc('${cmdId}','${prodId}',null)">CONFIRMAR</button>
    </div>
  </div>`;
  document.body.appendChild(ol);ol.addEventListener('click',e=>{if(e.target===ol)ol.remove();});
}
function _churrConfirmCanc(cmdId,prodId,motivo){
  const custom=(document.getElementById('churrMotivoCustom')?.value||'').trim();
  const m=motivo||(custom||'Cancelado');
  const key=_churrKey(cmdId,prodId);
  _churrStatus[key]={cancelado:true,motivo:m};
  document.getElementById('olChurrCanc')?.remove();
  toast('Item cancelado: '+m,'err');
  renderChurrascoScreen();
}

/* ════ PULL-TO-REFRESH ════ */
function initPTR(){
  const area=document.querySelector('.main-area');if(!area)return;
  area.addEventListener('touchstart',e=>{ptrY0=e.touches[0].clientY;},{passive:true});
  area.addEventListener('touchmove',e=>{
    const dy=e.touches[0].clientY-ptrY0;
    const scr=document.querySelector('.screen.active .prod-grid')||document.querySelector('.screen.active .admin-wrap');
    if(dy>0&&(!scr||scr.scrollTop<=0)){
      ptrDrag=true;
      document.getElementById('ptr').style.height=Math.min(dy*.35,56)+'px';
    }
  },{passive:true});
  area.addEventListener('touchend',async()=>{
    const ptr=document.getElementById('ptr');
    if(ptrDrag&&parseInt(ptr.style.height)>40)await reloadUI();
    ptr.style.height='0px';ptrDrag=false;
  },{passive:true});
}

];

  {id:'classic', name:'Clássico', font:"'Playfair Display',serif",       preview:'Aa'},

  {id:'friendly',name:'Amigável', font:"'Quicksand',sans-serif",         preview:'Aa'},
];

function _cfApplySettings(s){
  if(!s) s=JSON.parse(localStorage.getItem('cf_settings')||'{}');
  const themeId=s.theme||'dark';
  const t=THEMES.find(x=>x.id===themeId)||THEMES[0];
  const h=document.documentElement;
  // Aplica cores do tema
  h.style.setProperty('--bg', t.bg);
  if(t.light){
    h.style.setProperty('--text','#1a1816');
    h.style.setProperty('--s1','#ffffff');
    h.style.setProperty('--s2','#eae7e2');
    h.style.setProperty('--s3','#ddd9d3');
    h.style.setProperty('--border','#c8c4be');
    h.style.setProperty('--muted','#6b6660');
  } else {
    h.style.setProperty('--text','#f0f2ff');
    h.style.setProperty('--s1','#1a1f2e');
    h.style.setProperty('--s2','#222840');
    h.style.setProperty('--s3','#2a3050');
    h.style.setProperty('--border','rgba(255,255,255,0.1)');
    h.style.setProperty('--muted','rgba(255,255,255,0.45)');
  }
  h.style.setProperty('--fire', t.dot);
  h.style.setProperty('--ember', t.dot+'cc');
  if(s.fontScale) document.documentElement.style.setProperty('--font-scale', s.fontScale);
  if(s.fontStyle){const st=FONT_STYLES.find(f=>f.id===s.fontStyle);if(st){document.body.style.fontFamily=st.font;}}
}

function _loadAparencia(){
  _cfApplySettings();
}

  document.getElementById('olApar')?.remove();

  const curTheme=s.theme||'dark';
  const curFont=s.fontScale||'1';
  const curStyle=s.fontStyle||'default';
  const ol=document.createElement('div');ol.className='overlay';ol.id='olApar';
  ol.innerHTML=`<div class="modal" style="max-width:460px;max-height:88vh;overflow-y:auto">
    <div class="modal-title">⚙️ APARÊNCIA</div>
    <div class="modal-sub">Personalize o tema, fonte e tamanho do texto</div>
    <label class="flabel" style="margin-bottom:8px;display:block">🎨 TEMA</label>
    <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:18px">
      ${THEMES.map(t=>`<div onclick="_cfSetTheme('${t.id}')" id="themeBtn_${t.id}"
        style="cursor:pointer;border-radius:12px;border:2px solid ${curTheme===t.id?'var(--fire)':'var(--border)'};padding:14px 8px 10px;text-align:center;background:${t.bg};transition:all .2s">
        <div style="width:28px;height:28px;border-radius:50%;background:${t.dot};margin:0 auto 6px;border:2px solid rgba(255,255,255,0.2)"></div>
        <div style="font-size:11px;font-weight:700;color:${t.light?'#333':'#fff'}">${t.name}</div>
      </div>`).join('')}
    </div>
    <label class="flabel" style="margin-bottom:8px;display:block">📏 TAMANHO</label>
    <div style="display:flex;gap:8px;margin-bottom:18px">
      ${FONT_SIZES.map(f=>`<div onclick="_cfSetFontSize('${f.scale}')" id="fontBtn_${f.scale}"
        style="flex:1;border-radius:10px;padding:12px 4px;border:2px solid ${curFont===f.scale?'var(--fire)':'var(--border)'};cursor:pointer;text-align:center;background:var(--s2);display:flex;flex-direction:column;align-items:center;gap:4px;transition:all .2s">

    <label class="flabel" style="margin-bottom:8px;display:block">✍️ ESTILO</label>
    <div style="display:grid;grid-template-columns:repeat(5,1fr);gap:6px;margin-bottom:18px">
      ${FONT_STYLES.map(f=>`<div onclick="_cfSetFontStyle('${f.id}')" id="styleBtn_${f.id}"
        style="border-radius:10px;padding:12px 4px 9px;border:2px solid ${curStyle===f.id?'var(--fire)':'var(--border)'};cursor:pointer;text-align:center;background:var(--s2);display:flex;flex-direction:column;align-items:center;gap:5px;transition:all .2s">
        <span style="font-family:${f.font};font-size:20px;font-weight:700;color:${curStyle===f.id?'var(--fire)':'var(--text)'};line-height:1">${f.preview}</span>
        <span style="font-size:9px;font-weight:700;color:${curStyle===f.id?'var(--fire)':'var(--muted)'}">${f.name}</span>

}

function _cfSetTheme(id){
  const s=JSON.parse(localStorage.getItem('cf_settings')||'{}');s.theme=id;
  localStorage.setItem('cf_settings',JSON.stringify(s));_cfApplySettings(s);
  document.querySelectorAll('[id^="themeBtn_"]').forEach(b=>{
    const tid=b.id.replace('themeBtn_','');const on=tid===id;
    b.style.borderColor=on?'var(--fire)':'var(--border)';
  });
}
function _cfSetFontSize(scale){
  const s=JSON.parse(localStorage.getItem('cf_settings')||'{}');s.fontScale=scale;
  localStorage.setItem('cf_settings',JSON.stringify(s));
  document.documentElement.style.setProperty('--font-scale', scale);
  document.querySelectorAll('[id^="fontBtn_"]').forEach(b=>{
    const fid=b.id.replace('fontBtn_','');const on=fid===scale;
    b.style.borderColor=on?'var(--fire)':'var(--border)';
    const spans=b.querySelectorAll('span');
    if(spans[0])spans[0].style.color=on?'var(--fire)':'var(--text)';
    if(spans[1])spans[1].style.color=on?'var(--fire)':'var(--muted)';
  });
}
function _cfSetFontStyle(styleId){
  const s=JSON.parse(localStorage.getItem('cf_settings')||'{}');s.fontStyle=styleId;
  localStorage.setItem('cf_settings',JSON.stringify(s));
  const style=FONT_STYLES.find(f=>f.id===styleId)||FONT_STYLES[0];
  document.body.style.fontFamily=style.font;
  document.querySelectorAll('[id^="styleBtn_"]').forEach(b=>{
    const sid=b.id.replace('styleBtn_','');const on=sid===styleId;
    b.style.borderColor=on?'var(--fire)':'var(--border)';
    const spans=b.querySelectorAll('span');
    if(spans[0])spans[0].style.color=on?'var(--fire)':'var(--text)';
    if(spans[1])spans[1].style.color=on?'var(--fire)':'var(--muted)';
  });
}
