<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>ComandaFácil — PDV | Unilix</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Nunito:wght@400;600;700;800&family=Playfair+Display:wght@400;700&family=JetBrains+Mono:wght@400;700&family=Quicksand:wght@400;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<style>
:root{
  --bg:#0B0E1A;--s1:#12172B;--s2:#1a1f35;--s3:#222840;
  --border:rgba(255,255,255,0.08);--text:#f0f2ff;--muted:rgba(255,255,255,0.45);
  --fire:#5B5EF4;--ember:#00D2FF;--gold:#a5b4fc;
  --green:#10B981;--red:#ef4444;--blue:#00D2FF;
  --font:'Plus Jakarta Sans',sans-serif;--display:'Plus Jakarta Sans',sans-serif;
  --font-size-base:14px;
  --font-scale:1;
}
html,body{font-size:calc(14px * var(--font-scale))}
/* ─── TEMAS ─── */
[data-theme="midnight"]{
  --bg:#0d1117;--s1:#161b22;--s2:#1c2330;--s3:#252d3a;
  --border:#30363d;--text:#e6edf3;--muted:#7d8590;
  --fire:#58a6ff;--ember:#79c0ff;--gold:#e3b341;
  --green:#3fb950;--red:#f85149;--blue:#58a6ff;
}
[data-theme="coffee"]{
  --bg:#1a1410;--s1:#231c16;--s2:#2b221a;--s3:#342a20;
  --border:#4a3c2e;--text:#f0e6d6;--muted:#8a7a66;
  --fire:#d4a574;--ember:#e8c49a;--gold:#f5d48b;
  --green:#6bbd6e;--red:#e05549;--blue:#7eb8d8;
}
[data-theme="hacker"]{
  --bg:#0a0f0a;--s1:#101810;--s2:#152015;--s3:#1a281a;
  --border:#1e3a1e;--text:#d0ffd0;--muted:#4a8a4a;
  --fire:#00ff41;--ember:#39ff76;--gold:#c8ff00;
  --green:#00ff41;--red:#ff4444;--blue:#00d4ff;
}
[data-theme="light"]{
  --bg:#F5F7FF;--s1:#ffffff;--s2:#eef0ff;--s3:#e0e4ff;
  --border:#e0e4ff;--text:#111827;--muted:#6B7280;
  --fire:#5B5EF4;--ember:#7c3aed;--gold:#6366f1;
  --green:#10B981;--red:#ef4444;--blue:#5B5EF4;
}
[data-theme="wine"]{
  --bg:#1a0f18;--s1:#231520;--s2:#2c1a28;--s3:#362030;
  --border:#4a2e44;--text:#f2e6ee;--muted:#8a6a80;
  --fire:#c2185b;--ember:#e91e90;--gold:#ffd54f;
  --green:#66bb6a;--red:#ef5350;--blue:#7c4dff;
}
/* ─── FONTES ─── */
[data-fontfamily="inter"]{--font:'Plus Jakarta Sans',sans-serif;--display:'Plus Jakarta Sans',sans-serif;}}
[data-fontfamily="poppins"]{--font:'Plus Jakarta Sans',sans-serif;--display:'Plus Jakarta Sans',sans-serif;}}
[data-fontfamily="roboto"]{--font:'Plus Jakarta Sans',sans-serif;--display:'Plus Jakarta Sans',sans-serif;}}
[data-fontfamily="outfit"]{--font:'Plus Jakarta Sans',sans-serif;--display:'Plus Jakarta Sans',sans-serif;}}
/* ─── TAMANHO ─── */
[data-fontsize="small"]{font-size:12px;}
[data-fontsize="medium"]{font-size:14px;}
[data-fontsize="large"]{font-size:16px;}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{background:var(--bg);color:var(--text);font-family:var(--font);min-height:100vh;overflow:hidden;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");}

/* ─── LOGIN ─── */
#loginScreen{position:fixed;inset:0;background:var(--bg);z-index:99999;display:flex;align-items:center;justify-content:center;padding:20px;
  background-image:radial-gradient(ellipse at 50% 0%,rgba(255,87,34,.12) 0%,transparent 60%)}
.lbox{background:var(--s1);border:1px solid var(--border);border-radius:20px;padding:36px 30px;width:100%;max-width:420px;animation:popIn .22s}
.llogo{font-family:var(--display);font-size:44px;font-weight:900;color:var(--fire);text-align:center;line-height:1;letter-spacing:3px}
.llogo em{color:var(--ember);font-style:normal;font-weight:400}
.lsub{text-align:center;color:var(--muted);font-size:13px;margin:6px 0 22px}
.ulist{display:flex;flex-direction:column;gap:6px;max-height:240px;overflow-y:auto;margin-bottom:14px;padding-right:2px}
.ulist::-webkit-scrollbar{width:3px}.ulist::-webkit-scrollbar-thumb{background:var(--border)}
.ucard{display:flex;align-items:center;gap:12px;padding:11px 14px;border-radius:10px;border:2px solid var(--border);background:var(--s2);cursor:pointer;transition:all .15s}
.ucard:hover{border-color:var(--fire)66}.ucard.sel{border-color:var(--fire);background:var(--fire)0d}
.ucard-av{width:38px;height:38px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
.av-admin{background:var(--fire)22;border:1px solid var(--fire)33}
.av-atend{background:var(--blue)22;border:1px solid var(--blue)33}
.ucard-name{font-weight:700;font-size:14px}.ucard-role{font-size:11px;color:var(--muted)}
/* topbar user chip */
.user-chip{display:flex;align-items:center;gap:7px;padding:3px 10px 3px 6px;border-radius:8px;background:var(--s2);border:1px solid var(--border)}
.user-chip-av{width:26px;height:26px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:14px}
.user-chip-name{font-size:12px;font-weight:600;line-height:1}
.user-chip-role{font-size:10px;color:var(--muted);line-height:1}
.role-badge{padding:3px 10px;border-radius:6px;font-family:var(--display);font-size:12px;font-weight:700;letter-spacing:.5px;text-transform:uppercase}
.rb-admin{background:var(--fire)22;color:var(--fire);border:1px solid var(--fire)33}
.rb-atend{background:var(--blue)22;color:var(--blue);border:1px solid var(--blue)33}
.btn-sair{padding:5px 12px;border-radius:7px;border:1px solid var(--border);background:var(--s2);color:var(--muted);font-size:12px;font-weight:600;cursor:pointer;font-family:var(--font);transition:all .15s;white-space:nowrap}
.btn-sair:hover{border-color:var(--red)66;color:var(--red)}
/* dashboard */
.dash-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:12px;margin-bottom:24px}
.dash-card{background:var(--s2);border:1px solid var(--border);border-radius:14px;padding:16px;position:relative;overflow:hidden;cursor:pointer;transition:border-color .15s}
.dash-card:hover{border-color:var(--fire)44}
.dash-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;border-radius:14px 14px 0 0}
.dc-fire::before{background:linear-gradient(90deg,var(--fire),var(--ember))}
.dc-green::before{background:var(--green)}.dc-blue::before{background:var(--blue)}
.dc-red::before{background:var(--red)}.dc-purple::before{background:#9c7cf5}.dc-gold::before{background:var(--gold)}
.dash-lbl{font-family:var(--display);font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:6px}
.dash-val{font-family:var(--display);font-size:30px;font-weight:900;line-height:1;margin-bottom:2px}
.dash-sub{font-size:11px;color:var(--muted)}
.dash-icon{position:absolute;right:12px;top:14px;font-size:26px;opacity:.18}
/* pagamento pendente */
.pag-pend{background:#9c7cf511;border:2px solid #9c7cf544;border-radius:12px;padding:14px;margin-bottom:8px;display:flex;align-items:center;gap:12px;animation:blink 2.5s infinite}
@keyframes blink{0%,100%{border-color:#9c7cf533}50%{border-color:#9c7cf5bb}}
.btn-confirm{padding:8px 14px;border-radius:8px;border:none;background:var(--green);color:#fff;font-family:var(--display);font-size:14px;font-weight:700;cursor:pointer}
.btn-reject{padding:8px 14px;border-radius:8px;border:1px solid var(--red)44;background:transparent;color:var(--red);font-family:var(--display);font-size:14px;font-weight:700;cursor:pointer}
.pag-sol-badge{display:inline-block;font-size:9px;font-weight:700;padding:1px 6px;border-radius:4px;background:#9c7cf522;color:#9c7cf5;border:1px solid #9c7cf544;margin-left:4px}
.estq-row{background:var(--red)0d;border:1px solid var(--red)22;border-radius:9px;padding:10px 14px;display:flex;align-items:center;gap:10px;margin-bottom:5px}

/* ─── LAYOUT ─── */
.app{display:grid;grid-template-rows:52px 1fr;grid-template-columns:56px 1fr;height:100vh;overflow:hidden}
.topbar{grid-column:1/-1;background:var(--s1);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;padding:0 14px;position:relative;z-index:20}
.sidebar{background:var(--s1);border-right:1px solid var(--border);display:flex;flex-direction:column;align-items:center;padding:10px 0;gap:2px;z-index:10;overflow-y:auto;overflow-x:hidden}
.main-area{overflow:hidden;display:flex;flex-direction:column}
.logo{font-family:var(--display);font-size:26px;font-weight:900;letter-spacing:2px;color:var(--fire);text-transform:uppercase;line-height:1;flex-shrink:0}
.logo span{color:var(--ember);font-weight:400}
.logo-dot{width:5px;height:5px;background:var(--fire);border-radius:50%;display:inline-block;margin:0 3px;vertical-align:middle}
.nav-btn{width:40px;height:40px;border-radius:10px;border:none;background:transparent;color:var(--muted);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:18px;transition:all .15s;position:relative;flex-shrink:0}
.nav-btn:hover{background:var(--s3);color:var(--text)}
.nav-btn.active{background:var(--fire)20;color:var(--fire)}
.screen{display:none;flex:1;overflow:hidden;flex-direction:column}
.screen.active{display:flex}

/* ─── PDV ─── */
.pdv-wrap{display:flex;flex:1;overflow:hidden}
.pdv-catalog{display:flex;flex-direction:column;flex:1;overflow:hidden;border-right:1px solid var(--border)}
.cat-strip{display:flex;gap:6px;padding:10px 12px;overflow-x:auto;flex-shrink:0;border-bottom:1px solid var(--border)}
.cat-strip::-webkit-scrollbar{height:0}
.cat-pill{padding:5px 14px;border-radius:6px;border:1px solid var(--border);background:transparent;color:var(--muted);font-family:var(--display);font-size:15px;font-weight:700;letter-spacing:.5px;cursor:pointer;white-space:nowrap;transition:all .15s;text-transform:uppercase}
.cat-pill.on{background:var(--fire);border-color:var(--fire);color:#fff}
.cat-cards-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:10px;padding:12px}
.cat-card{background:var(--s2);border:2px solid var(--border);border-radius:14px;padding:18px 10px 14px;cursor:pointer;text-align:center;transition:all .15s;display:flex;flex-direction:column;align-items:center;gap:6px}
.cat-card:hover{border-color:var(--fire)66;transform:translateY(-2px)}
.cat-card:active{transform:scale(.96)}
.cat-card-icon{font-size:32px;line-height:1}
.cat-card-name{font-family:var(--display);font-weight:700;font-size:12px;color:var(--text);letter-spacing:.5px;text-transform:uppercase}
.cat-card-count{font-size:11px;color:var(--muted)}
.cat-back-btn{display:flex;align-items:center;gap:6px;padding:6px 14px;background:var(--fire)22;border:1px solid var(--fire)66;color:var(--fire);border-radius:8px;font-family:var(--display);font-weight:700;font-size:12px;cursor:pointer;white-space:nowrap}
.search-row{padding:8px 12px 0;flex-shrink:0}
.search-inp{width:100%;padding:7px 12px;border-radius:8px;border:1px solid var(--border);background:var(--s2);color:var(--text);font-size:13px;font-family:var(--font);outline:none;transition:border-color .15s}
.search-inp:focus{border-color:var(--fire)}
.search-inp::placeholder{color:var(--muted)}
.sort-bar{display:flex;gap:6px;padding:7px 12px 8px;align-items:center;border-bottom:1px solid var(--border);flex-shrink:0}
.sort-lbl{font-size:11px;color:var(--muted);font-family:var(--display);font-weight:700;letter-spacing:.5px;text-transform:uppercase;white-space:nowrap}
.sort-pill{padding:3px 11px;border-radius:6px;border:1px solid var(--border);background:transparent;color:var(--muted);font-family:var(--display);font-size:12px;font-weight:700;cursor:pointer;white-space:nowrap;transition:all .15s;text-transform:uppercase}
.sort-pill.on{background:var(--ember)22;border-color:var(--ember)66;color:var(--ember)}
.prod-grid{flex:1;overflow-y:auto;padding:10px;display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:8px;align-content:start}
.prod-grid::-webkit-scrollbar{width:4px}
.prod-grid::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px}
.prod-card{background:var(--s1);border:1px solid var(--border);border-radius:12px;cursor:pointer;transition:transform .15s,border-color .15s,box-shadow .15s;user-select:none;position:relative;display:flex;flex-direction:column;overflow:hidden}
.prod-card:hover{border-color:var(--fire)99;transform:translateY(-2px);box-shadow:0 8px 24px rgba(255,87,34,.15)}
.prod-card:active{transform:scale(.95)}
.prod-card.unavail{opacity:.35;pointer-events:none}
.prod-photo{width:100%;height:110px;background:var(--s2);display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden;flex-shrink:0}
.prod-photo img{width:100%;height:100%;object-fit:contain;position:absolute;inset:0;opacity:0;transition:opacity .3s}
.prod-photo img.loaded{opacity:1}
.prod-photo .emoji-fb{font-size:52px;line-height:1;z-index:1}
.prod-info{padding:6px 9px 8px;background:var(--s1);flex-shrink:0;min-height:52px}
.prod-nome{font-family:var(--display);font-size:13px;font-weight:700;letter-spacing:.3px;line-height:1.2;margin-bottom:3px;color:var(--text);display:block;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.prod-preco{font-family:var(--display);font-size:19px;font-weight:800;color:var(--fire);letter-spacing:.5px;display:block;line-height:1}
.prod-estq{font-size:10px;color:var(--muted);margin-top:2px;display:block}
.add-flash{position:absolute;inset:0;background:var(--fire);opacity:0;border-radius:12px;pointer-events:none}
.prod-card:active .add-flash{opacity:.2}

/* ─── COMANDA ─── */
.comanda-panel{width:320px;flex-shrink:0;display:flex;flex-direction:column;background:var(--s1)}
.cmd-header{padding:12px 14px 10px;border-bottom:1px solid var(--border);flex-shrink:0}
.cmd-title{font-family:var(--display);font-size:22px;font-weight:800;letter-spacing:.5px;display:flex;align-items:center;gap:8px}
.cmd-status{font-size:10px;font-weight:700;padding:2px 8px;border-radius:4px;text-transform:uppercase;letter-spacing:.5px;background:var(--green)22;color:var(--green);border:1px solid var(--green)44}
.cmd-itens-wrap{flex:1;overflow-y:auto;padding:8px}
.cmd-itens-wrap::-webkit-scrollbar{width:3px}
.cmd-itens-wrap::-webkit-scrollbar-thumb{background:var(--border)}
.cmd-empty{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:10px;color:var(--muted)}
.cmd-empty-icon{font-size:44px;filter:grayscale(1);opacity:.25}
.cmd-item{display:flex;align-items:center;gap:8px;padding:8px 10px;background:var(--s2);border-radius:9px;margin-bottom:5px;border:1px solid var(--border);animation:slideIn .15s ease}
@keyframes slideIn{from{opacity:0;transform:translateX(10px)}to{opacity:1;transform:none}}
.cmd-item-emoji{font-size:22px;flex-shrink:0;width:30px;text-align:center}
.cmd-item-info{flex:1;min-width:0}
.cmd-item-nome{font-size:12px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:var(--text)}
.cmd-item-unit{font-size:11px;color:var(--muted)}
.cmd-item-sub{font-family:var(--display);font-size:16px;font-weight:700;color:var(--ember);flex-shrink:0}
.qty-ctrl{display:flex;align-items:center;gap:3px;flex-shrink:0}
.qbtn{width:22px;height:22px;border-radius:5px;border:1px solid var(--border);background:var(--s3);color:var(--text);cursor:pointer;font-size:13px;font-weight:700;display:flex;align-items:center;justify-content:center;transition:all .12s}
.qbtn:hover{background:var(--fire);border-color:var(--fire);color:#fff}
.qnum{font-size:13px;font-weight:700;min-width:18px;text-align:center;font-family:var(--display)}
.levar-badge{display:inline-block;font-size:9px;font-weight:700;padding:1px 5px;border-radius:4px;background:var(--s3);color:var(--muted);border:1px solid var(--border);cursor:pointer;margin-left:3px;transition:all .15s}
.levar-badge.on{background:var(--blue)22;color:var(--blue);border-color:var(--blue)44}
.cmd-footer{padding:10px 14px 12px;border-top:2px solid var(--border);flex-shrink:0}
.total-line{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:10px}
.total-label{font-family:var(--display);font-size:13px;font-weight:700;color:var(--muted);letter-spacing:1px;text-transform:uppercase}
.total-value{font-family:var(--display);font-size:32px;font-weight:900;color:var(--fire);line-height:1}
.total-currency{font-size:16px;color:var(--ember);margin-right:2px}
.btn-close-cmd{width:100%;padding:12px;border-radius:9px;border:none;background:linear-gradient(135deg,var(--fire),var(--ember));color:#fff;font-family:var(--display);font-size:20px;font-weight:800;letter-spacing:1px;cursor:pointer;transition:all .15s;text-transform:uppercase}
.btn-close-cmd:hover{filter:brightness(1.1)}
.cmd-actions{display:flex;gap:6px;margin-top:6px}
.cmd-act-btn{flex:1;padding:7px;border-radius:8px;border:1px solid var(--border);background:var(--s2);color:var(--muted);font-size:11px;font-weight:600;cursor:pointer;font-family:var(--font);transition:all .15s;text-align:center}
.cmd-act-btn:hover{color:var(--text);border-color:var(--text)}
.cmd-act-btn.red:hover{color:var(--red);border-color:var(--red)44;background:var(--red)11}
.no-cmd{display:flex;flex-direction:column;height:100%}
.open-cmd-btn{margin:14px;padding:13px;border-radius:10px;border:none;background:linear-gradient(135deg,var(--fire),var(--ember));color:#fff;font-family:var(--display);font-size:20px;font-weight:800;letter-spacing:1px;cursor:pointer;text-transform:uppercase}
.open-cmds-label{padding:0 14px 8px;font-family:var(--display);font-size:12px;font-weight:700;color:var(--muted);letter-spacing:1px;text-transform:uppercase;border-bottom:1px solid var(--border)}
.cmd-mini-list{flex:1;overflow-y:auto;padding:8px}
.cmd-mini{display:flex;align-items:center;gap:10px;padding:9px 11px;background:var(--s2);border-radius:9px;margin-bottom:5px;cursor:pointer;border:1px solid var(--border);transition:all .15s}
.cmd-mini:hover,.cmd-mini.sel{border-color:var(--fire);background:var(--fire)0d}
.cmd-mini-nome{font-weight:600;font-size:13px;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.cmd-mini-val{font-family:var(--display);font-size:16px;color:var(--ember);flex-shrink:0}
.cmd-mini-sub{font-size:11px;color:var(--muted)}
.cmd-num{font-size:11px;color:var(--ember);font-family:var(--display);font-weight:700}

/* ─── ADMIN ─── */
.admin-wrap{flex:1;overflow-y:auto;padding:20px}
.admin-wrap::-webkit-scrollbar{width:4px}
.admin-wrap::-webkit-scrollbar-thumb{background:var(--border)}
.sec-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;flex-wrap:wrap;gap:8px}
.sec-title{font-family:var(--display);font-size:28px;font-weight:800;letter-spacing:1px;text-transform:uppercase;color:var(--text)}
.btn-prim{padding:8px 18px;border-radius:8px;border:none;background:var(--fire);color:#fff;font-family:var(--display);font-size:16px;font-weight:700;letter-spacing:.5px;cursor:pointer;transition:all .15s}
.btn-prim:hover{background:var(--ember)}
.btn-sec{padding:7px 14px;border-radius:8px;border:1px solid var(--border);background:var(--s2);color:var(--text);font-family:var(--display);font-size:14px;font-weight:700;letter-spacing:.5px;cursor:pointer;transition:all .15s}
.btn-sec:hover{border-color:var(--fire);color:var(--fire)}
.btn-sec.active{background:var(--fire)22;border-color:var(--fire);color:var(--fire)}
.tbl{width:100%;border-collapse:collapse}
.tbl th{text-align:left;font-family:var(--display);font-size:12px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;padding:8px 12px;border-bottom:1px solid var(--border)}
.tbl td{padding:10px 12px;border-bottom:1px solid var(--border)66;font-size:13px;vertical-align:middle}
.tbl tr:hover td{background:var(--s2)}
/* Planilha edição em lote */
.lote-wrap{overflow-x:auto}
.lote-tbl{width:100%;border-collapse:collapse;font-size:13px}
.lote-tbl th{position:sticky;top:0;z-index:2;background:var(--s2);text-align:left;font-family:var(--display);font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;padding:10px 8px;border-bottom:2px solid var(--border);white-space:nowrap}
.lote-tbl td{padding:5px 6px;border-bottom:1px solid var(--border)44;vertical-align:middle}
.lote-tbl tr:hover td{background:var(--s2)44}
.lote-tbl tr.lote-changed td{background:var(--fire)08;border-bottom-color:var(--fire)33}
.lote-tbl tr.lote-saved td{background:var(--green)08;border-bottom-color:var(--green)33}
.lote-cat{background:var(--s2);font-family:var(--display);font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:1px;padding:8px 10px;border-bottom:1px solid var(--border);border-left:3px solid var(--fire)}
.lote-inp{background:var(--s1);border:1px solid var(--border);border-radius:6px;color:var(--text);font-size:13px;font-family:var(--font);padding:5px 8px;width:100%;min-width:70px;text-align:right;transition:border-color .15s}
.lote-inp:focus{outline:none;border-color:var(--fire);background:var(--s2)}
.lote-inp.changed{border-color:var(--ember);background:var(--ember)11}
.lote-inp.saved{border-color:var(--green);background:var(--green)11}
.lote-nome{display:flex;align-items:center;gap:8px;font-weight:600;white-space:nowrap;font-size:13px}
.lote-estq-badge{font-size:10px;padding:1px 5px;border-radius:3px;font-family:var(--display)}
.lote-toolbar{display:flex;justify-content:space-between;align-items:center;padding:12px 0 16px;flex-wrap:wrap;gap:10px;position:sticky;top:0;z-index:3;background:var(--bg);border-bottom:1px solid var(--border);margin-bottom:12px}
.lote-stats{font-size:12px;color:var(--muted)}
.lote-stats strong{color:var(--ember)}
.lote-filter{display:flex;gap:6px;flex-wrap:wrap}
.lote-filter button{padding:4px 10px;border-radius:6px;border:1px solid var(--border);background:transparent;color:var(--muted);cursor:pointer;font-size:11px;font-family:var(--font)}
.lote-filter button.active{background:var(--fire)22;border-color:var(--fire)66;color:var(--fire)}
.pill{display:inline-block;padding:2px 8px;border-radius:4px;font-size:11px;font-weight:700;font-family:var(--display);letter-spacing:.3px}
.pp{background:#9c7cf522;color:#9c7cf5;border:1px solid #9c7cf544}
.pill-green{background:var(--green)22;color:var(--green)}
.pill-red{background:var(--red)22;color:var(--red)}
.pill-fire{background:var(--fire)22;color:var(--fire)}
.pill-muted{background:var(--border);color:var(--muted)}
.pill-blue{background:var(--blue)22;color:var(--blue)}

/* ─── MODAIS ─── */
.overlay{position:fixed;inset:0;background:#000000e0;z-index:9000;display:flex;align-items:center;justify-content:center;padding:16px;animation:fadeIn .12s;overflow-y:auto}
.modal{background:var(--s1);border:1px solid var(--border);border-radius:16px;padding:24px;width:100%;max-width:460px;max-height:90vh;overflow-y:auto;animation:popIn .18s}
.modal::-webkit-scrollbar{width:3px}
.modal::-webkit-scrollbar-thumb{background:var(--border)}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-6px)}40%{transform:translateX(6px)}60%{transform:translateX(-4px)}80%{transform:translateX(4px)}}
@keyframes popIn{from{transform:scale(.94);opacity:0}to{transform:scale(1);opacity:1}}
.modal-title{font-family:var(--display);font-size:24px;font-weight:800;letter-spacing:.5px;margin-bottom:2px;text-transform:uppercase}
.modal-sub{font-size:12px;color:var(--muted);margin-bottom:18px}
.fgrp{margin-bottom:13px}
.flabel{display:block;font-family:var(--display);font-size:12px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:5px}
.finput{width:100%;padding:9px 12px;border-radius:8px;border:1px solid var(--border);background:var(--s2);color:var(--text);font-size:14px;font-family:var(--font);outline:none;transition:border-color .15s}
.finput:focus{border-color:var(--fire)}
.finput::placeholder{color:var(--muted)66}
.frow{display:grid;gap:10px}
.fcols2{grid-template-columns:1fr 1fr}
.fcols3{grid-template-columns:1fr 1fr 1fr}
.modal-btns{display:flex;gap:8px;margin-top:18px}
.btn-cancel{flex:1;padding:10px;border-radius:8px;border:1px solid var(--border);background:var(--s2);color:var(--text);font-size:14px;cursor:pointer;font-family:var(--font)}
.btn-save{flex:2;padding:10px;border-radius:8px;border:none;background:var(--fire);color:#fff;font-family:var(--display);font-size:18px;font-weight:800;letter-spacing:.5px;cursor:pointer;transition:all .15s}
.btn-save:hover{background:var(--ember)}
.pag-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px}
.pag-opt{padding:10px;border-radius:8px;border:1px solid var(--border);background:var(--s2);color:var(--text);font-size:13px;font-weight:600;cursor:pointer;text-align:center;transition:all .15s;font-family:var(--font)}
.pag-opt:hover{border-color:var(--ember);color:var(--ember)}
.pag-opt.on{background:var(--fire);border-color:var(--fire);color:#fff}
.pix-qr-box{display:none;flex-direction:column;align-items:center;gap:8px;background:var(--s2);border-radius:10px;padding:14px;border:1px solid var(--border);margin-bottom:12px}
.pix-qr-box.show{display:flex}
.pix-qr-box img{border-radius:8px;background:#fff;padding:6px;width:180px;height:180px}
.rel-cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:10px;margin-bottom:24px}
.rel-card{background:var(--s2);border:1px solid var(--border);border-radius:12px;padding:14px}
.rel-card-label{font-family:var(--display);font-size:11px;font-weight:700;color:var(--muted);letter-spacing:1px;text-transform:uppercase;margin-bottom:4px}
.rel-card-value{font-family:var(--display);font-size:26px;font-weight:900;line-height:1}
.tb-pill{padding:3px 10px;border-radius:6px;font-family:var(--display);font-size:12px;font-weight:700;letter-spacing:.5px}
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(8px);background:var(--s2);border:1px solid var(--border);border-radius:10px;padding:9px 18px;font-size:13px;font-weight:600;z-index:99999;opacity:0;transition:all .25s;pointer-events:none;white-space:nowrap;box-shadow:0 8px 32px #0009}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.toast.ok{border-color:var(--green)66;color:var(--green)}
.toast.err{border-color:var(--red)66;color:var(--red)}
.toast.info{border-color:var(--ember)66;color:var(--ember)}
.hist-card{background:var(--s2);border:1px solid var(--border);border-radius:10px;padding:12px;margin-bottom:6px;cursor:pointer;transition:border-color .15s}
.hist-card:hover{border-color:var(--fire)66}
.skel{background:linear-gradient(90deg,var(--s2) 25%,var(--s3) 50%,var(--s2) 75%);background-size:200% 100%;animation:shimmer 1.2s infinite;border-radius:8px}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}

/* Mobile navbar */
.mobile-nav{display:none;position:fixed;bottom:0;left:0;right:0;background:var(--s1);border-top:2px solid var(--border);z-index:9999;padding:4px 0 env(safe-area-inset-bottom,4px);transform:translateZ(0);-webkit-transform:translateZ(0)}
.mobile-nav-inner{display:flex;justify-content:space-around;overflow-x:auto;-webkit-overflow-scrolling:touch;flex-wrap:nowrap}
.mnav-btn{display:flex;flex-direction:column;align-items:center;gap:2px;padding:6px 8px;border:none;background:transparent;color:var(--muted);cursor:pointer;min-width:48px}
.mnav-btn.active{color:var(--fire)}
.mnav-btn .mi{font-size:20px;line-height:1}
.mnav-btn .ml{font-size:9px;font-family:var(--display);font-weight:700;letter-spacing:.3px;text-transform:uppercase}
.ptr{position:fixed;top:0;left:0;right:0;height:0;background:var(--fire)22;display:flex;align-items:flex-end;justify-content:center;z-index:9999;overflow:hidden;pointer-events:none}
.ptr span{font-size:18px;padding-bottom:4px}
.admin-only-el{display:none}

  /* Layout: flex coluna, sem grid */

<script>
/* ════ SUPABASE ════ */
const SB_URL  = '{{SUPABASE_URL}}';
const SB_ANON = '{{SUPABASE_KEY}}';
const sb = window.supabase.createClient(SB_URL, SB_ANON);

/* ════ STATE ════ */
let PRODS=[],CLIS=[],CMDS=[],ITENS=[],USERS=[];
let _churrStatus={}; // {itemKey: 'pronto'|'cancelado'|{motivo}}
let activeCmdId=null,filterCat='Todos',sortMode='cat',fltCmdAtual='hoje';
let _mobileShowingList=true; // true=lista, false=itens da comanda
let currentUser=null;
let _toastT,ptrY0=0,ptrDrag=false;

/* ════ USUÁRIOS / LOGIN ════ */
const ADMIN_DEFAULT={id:'u-admin',nome:'Admin',login:'admin',emoji:'👑',role:'admin',senha:'1234'};

async function _loadUsers(){
  // Usuários fixos no código (fallback total enquanto Supabase não responde)
  USERS=[];
  // Carrega do banco
  try{
    const res=await fetch(SB_URL+'/rest/v1/pdv_usuarios?select=*&order=nome.asc',{
      headers:{'apikey':SB_ANON,'Authorization':'Bearer '+SB_ANON}
    });
    const data=await res.json();
    if(Array.isArray(data)&&data.length) USERS=data;
  }catch(e){ console.warn('pdv_usuarios erro:', e); }
  setTimeout(()=>document.getElementById('loginUsuario')?.focus(),100);
}

function _showLoginErro(msg){
  const el=document.getElementById('loginErro');
  if(!el)return;
  el.textContent=msg;
  el.style.display=msg?'block':'none';
  if(msg){
    // Shake animation
    el.style.animation='none';
    requestAnimationFrame(()=>{el.style.animation='shake .3s';});
  }
}

function _entrar(){
  const loginVal=(document.getElementById('loginUsuario')?.value||'').trim().toLowerCase();
  const senha=document.getElementById('loginSenha')?.value||'';
  if(!loginVal){_showLoginErro('Informe seu usuário.');document.getElementById('loginUsuario').focus();return;}
  if(!senha){_showLoginErro('Informe sua senha.');document.getElementById('loginSenha').focus();return;}

  // Busca pelo campo 'usuario' (campo correto no banco), com fallback para 'login', 'nome'
  const u=USERS.find(x=>
    (x.usuario||'').toLowerCase()===loginVal ||
    (x.login||'').toLowerCase()===loginVal ||
    (x.nome||'').toLowerCase()===loginVal
  );
  if(!u){_showLoginErro('Usuário não encontrado ❌');document.getElementById('loginUsuario').focus();return;}
  if(senha!==(u.senha||'1234')){_showLoginErro('Senha incorreta ❌');document.getElementById('loginSenha').focus();return;}

  _showLoginErro('');
  currentUser=u;
  document.getElementById('loginScreen').style.display='none';
  _applyRole();_bootApp();
}

function _abrirAlterarSenha(){
  const ol=document.createElement('div');ol.className='overlay';ol.id='olAltSenha';
  ol.style.zIndex='999999';
  ol.innerHTML=`<div class="modal" style="max-width:360px">
    <div class="modal-title">🔑 Alterar Senha</div>
    <div class="modal-sub">Digite seu usuário e a senha atual para confirmar</div>
    <div class="fgrp"><label class="flabel">Usuário</label>
      <input id="asSenhaUser" class="finput" placeholder="Seu usuário…" autocomplete="username">
    </div>
    <div class="fgrp"><label class="flabel">Senha atual</label>
      <input id="asSenhaAtual" class="finput" type="password" placeholder="Senha atual…">
    </div>
    <div class="fgrp"><label class="flabel">Nova senha</label>
      <input id="asSenhaNova" class="finput" type="password" placeholder="Nova senha…">
    </div>
    <div class="fgrp"><label class="flabel">Confirmar nova senha</label>
      <input id="asSenhaConf" class="finput" type="password" placeholder="Repita a nova senha…" onkeydown="if(event.key==='Enter')_salvarNovaSenha()">
    </div>
    <div id="asSenhaErro" style="display:none;color:var(--red);font-size:12px;margin-bottom:8px;text-align:center"></div>
    <div class="modal-btns">
      <button class="btn-cancel" onclick="document.getElementById('olAltSenha').remove()">Cancelar</button>
      <button class="btn-save" onclick="_salvarNovaSenha()">SALVAR</button>
    </div>
  </div>`;
  document.body.appendChild(ol);
  ol.addEventListener('click',e=>{if(e.target===ol)ol.remove();});
  setTimeout(()=>document.getElementById('asSenhaUser')?.focus(),60);
}
async function _salvarNovaSenha(){
  const usuario=(document.getElementById('asSenhaUser')?.value||'').trim().toLowerCase();
  const atual=document.getElementById('asSenhaAtual')?.value||'';
  const nova=document.getElementById('asSenhaNova')?.value||'';
  const conf=document.getElementById('asSenhaConf')?.value||'';
  const erroEl=document.getElementById('asSenhaErro');
  const showErr=msg=>{if(erroEl){erroEl.textContent=msg;erroEl.style.display='block';}};
  if(!usuario||!atual||!nova){showErr('Preencha todos os campos');return;}
  if(nova.length<3){showErr('Nova senha muito curta (mín. 3 caracteres)');return;}
  if(nova!==conf){showErr('Senhas não conferem');return;}
  // Busca usuário
  const u=USERS.find(x=>(x.usuario||x.login||'').toLowerCase()===usuario);
  if(!u){showErr('Usuário não encontrado');return;}
  if(atual!==(u.senha||'1234')){showErr('Senha atual incorreta ❌');return;}
  // Salva no banco
  const {error}=await sb.from('pdv_usuarios').update({senha:nova}).eq('id',u.id);
  if(error){showErr('Erro ao salvar: '+error.message);return;}
  // Atualiza local
  u.senha=nova;
  document.getElementById('olAltSenha')?.remove();
  toast('✅ Senha alterada com sucesso!','ok');
}
function _sair(){
  if(!confirm('Deseja sair?'))return;
  currentUser=null;
  PRODS=[];CLIS=[];CMDS=[];ITENS=[];activeCmdId=null;
  sairComanda();
  document.getElementById('loginUsuario').value='';
  document.getElementById('loginSenha').value='';
  _showLoginErro('');
  document.getElementById('userChip').style.display='none';
  document.getElementById('loginScreen').style.display='flex';
  setTimeout(()=>document.getElementById('loginUsuario')?.focus(),100);
  nav('pdv');
}
function _applyRole(){
  const role=(currentUser?.role||'').toLowerCase().trim();
  const isAdmin=role==='admin'||role==='administrador';
  const isChurrasqueiro=role==='churrasqueiro';
  currentUser._isAdmin=isAdmin;
  currentUser._isChurrasqueiro=isChurrasqueiro;
  const chip=document.getElementById('userChip');
  document.getElementById('ucAv').textContent=currentUser?.emoji||'👤';
  document.getElementById('ucAv').className='user-chip-av '+(isAdmin?'av-admin':'av-atend');
  document.getElementById('ucNome').textContent=currentUser?.nome||'';
  document.getElementById('ucRole').textContent=isAdmin?'Admin':isChurrasqueiro?'Churrasqueiro':'Atendente';
  chip.style.display='flex';
  // Botão churrasco: SÓ para churrasqueiro (admin não vê)
  ['nb-churrasco','mnb-churrasco'].forEach(id=>{
    const el=document.getElementById(id);
    if(el)el.style.setProperty('display',isChurrasqueiro?'flex':'none','important');
  });
  // Elementos admin-only
  document.querySelectorAll('.admin-only-el').forEach(el=>{
    el.style.setProperty('display', isAdmin ? 'flex' : 'none', 'important');
  });
}
function _updateNotifs(){
  const pagSol=CMDS.filter(c=>c.status==='pag_solicitado').length;
  const tp=document.getElementById('tbPagPend');
  if(pagSol){tp.textContent='💜 '+pagSol+' aguardando';tp.style.display='block';}else tp.style.display='none';
  const nb=document.getElementById('cmdNavBadge');if(nb)nb.style.display=pagSol?'block':'none';
  const abertas=CMDS.filter(c=>c.status==='aberta'||c.status==='pag_solicitado').length;
  const ta=document.getElementById('tbCmdAberta');
  if(ta){if(abertas){ta.textContent=abertas+' aberta'+(abertas>1?'s':'');ta.style.display='block';}else ta.style.display='none';}
}

/* ════ SSO HUB ════ */
async function _checkHubSSO(){
  try{
    const cfUser=localStorage.getItem('cf_user');
    if(!cfUser)return false;
    const u=JSON.parse(cfUser);
    if(!u||!u.usuario)return false;
    await _loadUsers();
    const found=USERS.find(x=>(x.usuario||'').toLowerCase()===u.usuario.toLowerCase());
    if(found){
      currentUser=found;
      document.getElementById('loginScreen').style.display='none';
      _applyRole();_bootApp();
      return true;
    }
  }catch(e){}
  return false;
}

/* ════ BOOT ════ */
(async()=>{
  await _loadUsers();
  _loadAparencia();
  const sso=await _checkHubSSO();
})();

async function _bootApp(){
  _cfApplySettings();
  await reload();
  renderCatStrip();renderGrid();renderMiniCmds();initRelDates();initPTR();_loadAparencia();
  // Aplica role novamente após boot para garantir visibilidade dos elementos admin
  _applyRole();
  const role=(currentUser?.role||'').toLowerCase().trim();
  const isAdmin=role==='admin'||role==='administrador';
  const role2=(currentUser?.role||'').toLowerCase().trim();
  const startNav=isAdmin?'dashboard':'pdv';
  nav(startNav);
  // Inicializa history para interceptar voltar do browser
  if(_isMobile()){
    history.replaceState({nav:startNav},'',location.pathname+'#'+startNav);
  }
}

// Normaliza comanda: usa colunas próprias (fechada_em, fechada_por) se existirem,
// com fallback para workaround legacy "PIX||Zé||ISO_DATE" no campo pagamento
function _parseCmdPagamento(c){
  // Não processar campo pagamento de comandas canceladas — o motivo fica em pagamento
  if(c.pagamento&&c.pagamento.startsWith('CANCELADO'))return c;
  if(c.pagamento&&c.pagamento.includes('||')){
    const partes=c.pagamento.split('||');
    c.pagamento=partes[0];
    if(partes[1]&&!/^\d{4}-/.test(partes[1]))c.fechada_por=c.fechada_por||partes[1];
    const isoField=partes.find(p=>/^\d{4}-\d{2}-\d{2}T/.test(p));
    if(isoField)c.fechada_em=c.fechada_em||isoField;
  }
  return c;
}
async function reload() {
  try {
    const H={'apikey':SB_ANON,'Authorization':'Bearer '+SB_ANON};
    const [rp,rc,rcm,ri] = await Promise.all([
      fetch(SB_URL+'/rest/v1/pdv_produtos?select=*&ativo=eq.true&order=categoria.asc,nome.asc',{headers:H}).then(r=>r.json()),
      fetch(SB_URL+'/rest/v1/pdv_clientes?select=*&order=nome.asc',{headers:H}).then(r=>r.json()),
      fetch(SB_URL+'/rest/v1/pdv_comandas?select=*&order=aberta_em.desc&limit=300',{headers:H}).then(r=>r.json()),
      fetch(SB_URL+'/rest/v1/pdv_itens?select=*&order=criado_em.asc',{headers:H}).then(r=>r.json()),
    ]);
    PRODS=Array.isArray(rp)?rp:[]; CLIS=Array.isArray(rc)?rc:[];
    CMDS=Array.isArray(rcm)?rcm.map(_parseCmdPagamento):[];
    ITENS=Array.isArray(ri)?ri:[];
    sync('ok');_updateNotifs();
  } catch(e) { sync('err'); console.error(e); toast('Erro de conexão','err'); }
}

  const btn=document.getElementById('btnReload');
  if (btn){btn.textContent='⏳';btn.disabled=true;}

  if (btn){btn.textContent='↺';btn.disabled=false;}
  toast('Atualizado ✅','ok');
}

function _getFotoUrl(prod){
  if(prod.foto_url)return prod.foto_url;
  const nome=(prod.nome||'').toLowerCase();
  const cat=(prod.categoria||'').toLowerCase();
  const txt=nome+' '+cat;
  for(const item of _FOTO_MAP){
    if(item.k.some(k=>txt.includes(k)))return item.u;
  }
  // Fallback genérico por categoria
  if(cat.includes('bebida')||cat.includes('drink'))return 'https://images.unsplash.com/photo-1608270586620-248524c67de9?w=300&q=80';
  if(cat.includes('sobremesa'))return 'https://images.unsplash.com/photo-1551024506-0bccd828d307?w=300&q=80';
  // Default restaurante
  return 'https://images.unsplash.com/photo-1555939594-58d7cb561ad1?w=300&q=80';
}

let _navHistory=[];
let _currentNav='pdv';

function _closeAllOverlays(){
  document.querySelectorAll('.overlay').forEach(ol=>ol.remove());
}
function _navActivate(name){
  _closeAllOverlays();
  // Aplica a troca de tela no DOM
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.querySelectorAll('.nav-btn,.mnav-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('sc-'+name)?.classList.add('active');
  document.getElementById('nb-'+name)?.classList.add('active');
  document.getElementById('mnb-'+name)?.classList.add('active');
  if(name==='dashboard') renderDashboard();
  if(name==='comandas') renderComandasScreen();
  if(name==='produtos') renderProdScreen();
  if(name==='clientes') renderCliScreen();
  if(name==='relatorio') renderRelatorio();
  if(name==='caixa'){const d=document.getElementById('caixaData');if(d&&!d.value)d.value=new Date().toISOString().slice(0,10);renderCaixa();}
  if(name==='funcionarios') renderFuncScreen();
  if(name==='churrasco') renderChurrascoScreen();
}

function _pushNav(name){
  if(_isMobile() && _currentNav && _currentNav!==name){
    _navHistory.push(_currentNav);
    if(_navHistory.length>15) _navHistory.shift();
  }
  _currentNav=name;
  if(_isMobile()) history.pushState({nav:name},'',location.pathname+'#'+name);
}

let _navUserClick=false;
function nav(name){
  if(!_isMobile()){
    // Desktop: navegação simples
    _currentNav=name;
    _navActivate(name);
    return;
  }

  // ── MOBILE ──

  // Atendente não usa sc-comandas → usa tela própria
  if(name==='comandas' && !currentUser?._isAdmin){
    _navTabComanda(); return;
  }

  // Clicou na aba PDV
  if(name==='pdv'){
    if(_currentNav==='pdv' && activeCmdId && _navUserClick){
      // Só desativa se foi clique do usuário na aba (não chamada interna)
      activeCmdId=null;
      document.getElementById('noCmd').style.display='flex';
      document.getElementById('cmdAtiva').style.display='none';
      _updateCmdBar();
      renderMiniCmds();
      toast('Comanda desativada','info');
    }
    _pushNav('pdv');
    _navActivate('pdv');
    _navUserClick=false;
    return;
  }

  // Navegação normal
  _pushNav(name);
  _navActivate(name);
  _navUserClick=false;
}

// Aba "Comanda" — lógica de clique
function _navTabComanda(){
  sairComanda();
}

function _mobileBack(){
  const prev=_navHistory.pop();
  if(prev){ const old=_currentNav; _currentNav=''; if(old==='comanda-mobile'||prev==='comanda-mobile') navComandaMobile(); else nav(prev); }
  else nav('pdv');
}

// Intercepta botão VOLTAR do browser
window.addEventListener('popstate',function(e){
  if(!_isMobile()) return;
  e.preventDefault();
  const prev=_navHistory.pop();
  const dest=prev||'pdv';
  _currentNav='';
  if(dest==='comanda-mobile') navComandaMobile();
  else nav(dest);
  history.pushState({nav:_currentNav},'',location.pathname+'#'+_currentNav);
});

  const fechHoje=cmdsHoje.filter(c=>c.status==='fechada');
  const fatHoje=fechHoje.reduce((a,c)=>a+Number(c.total),0);
  const abertas=CMDS.filter(c=>c.status==='aberta');
  const pagSol=CMDS.filter(c=>c.status==='pag_solicitado');

  // Margem: só produtos com preço > 0 e custo > 0
  const prodsComMargem=PRODS.filter(p=>p.preco>0&&p.custo>0);
  const margem=p=>Math.round((p.preco-p.custo)/p.preco*100);
  const prodMaiorMargem=prodsComMargem.length?[...prodsComMargem].sort((a,b)=>margem(b)-margem(a))[0]:null;
  const prodMenorMargem=prodsComMargem.length?[...prodsComMargem].sort((a,b)=>margem(a)-margem(b))[0]:null;

  // Vendas: contagem de todos os itens (não só hoje)

function _modalItensVendidosHoje(){
  const hoje=new Date();hoje.setHours(0,0,0,0);
  const cmdsHoje=CMDS.filter(c=>c.aberta_em&&new Date(c.aberta_em)>=hoje);
  const itensHj=ITENS.filter(i=>cmdsHoje.find(c=>c.id===i.comanda_id));
  const grp={};
  itensHj.forEach(i=>{
    if(!grp[i.produto_id])grp[i.produto_id]={nome:i.produto_nome,emoji:i.emoji||'🍢',qty:0,total:0};
    grp[i.produto_id].qty+=Number(i.qty);

/* ════ PRODUTO GRID ════ */
function renderGrid(){
  const q=(document.getElementById('searchProd')?.value||'').toLowerCase().trim();
  const el=document.getElementById('prodGrid');

  // Modo categorias sem filtro ativo → mostrar cards de categoria
  if(sortMode==='cat' && filterCat==='Todos' && !q){
    const cats=[...new Set(PRODS.map(p=>p.categoria))].sort((a,b)=>a.localeCompare(b,'pt-BR'));
    const catIcons={'espetinho':'🍢','grelhado':'🥩','bebida':'🥤','lanche':'🍔','porção':'🍟','porcao':'🍟','sobremesa':'🍨','prato':'🍽️','drink':'🍹','frango':'🍗','carne':'🥩','peixe':'🐟','vegano':'🥗','vegetal':'🥗','massa':'🍝','pizza':'🍕','salgado':'🥨'};
    const getIcon=cat=>{
      const cl=cat.toLowerCase();
      const k=Object.keys(catIcons).find(k=>cl.includes(k));
      return k?catIcons[k]:'🏷️';
    };
    el.innerHTML=`<div class="cat-cards-grid">${cats.map(c=>{
      const count=PRODS.filter(p=>p.categoria===c).length;
      return `<div class="cat-card" onclick="setcat('${esc(c)}')">
        <div class="cat-card-icon">${getIcon(c)}</div>
        <div class="cat-card-name">${esc(c)}</div>
        <div class="cat-card-count">${count} produto${count!==1?'s':''}</div>
      </div>`;
    }).join('')}</div>`;
    return;
  }

  let list=PRODS.filter(p=>filterCat==='Todos'||p.categoria===filterCat);
  if(q) list=list.filter(p=>p.nome.toLowerCase().includes(q)||(p.categoria||'').toLowerCase().includes(q));
  if(sortMode==='az') list=[...list].sort((a,b)=>a.nome.localeCompare(b.nome,'pt-BR'));
  else if(sortMode==='top'){
    const v={}; ITENS.forEach(i=>v[i.produto_id]=(v[i.produto_id]||0)+Number(i.qty));
    list=[...list].sort((a,b)=>(v[b.id]||0)-(v[a.id]||0));
  }
  if(!list.length){el.innerHTML=`<div style="grid-column:1/-1;padding:48px;text-align:center;color:var(--muted)">Nenhum produto</div>`;return;}
  el.innerHTML=list.map(p=>{
    const _fotoSrc=_getFotoUrl(p);
    const imgHtml=`<img src="${esc(_fotoSrc)}" alt="" loading="lazy" onload="this.classList.add('loaded')" onerror="this.style.display='none'">`;
    return `<div class="prod-card ${p.estoque<=0?'unavail':''}" onclick="addItem('${p.id}')">
      <div class="prod-photo">${imgHtml}</div>
      <div class="prod-info">
        <span class="prod-nome">${esc(p.nome)}</span>
        <span class="prod-preco">R$ ${fmtR(p.preco)}</span>
        <span class="prod-estq">${p.estoque>0?p.estoque+' '+esc(p.unidade):'sem estoque'}</span>
      </div>
      <div class="add-flash"></div>
    </div>`;
  }).join('');
}

async function _criarComanda(){
  const obs=document.getElementById('ncObs')?.value||'';
  const nomeDigitado=(document.getElementById('ncNomeInput')?.value||'').trim();
  let cliId=null,cliNome='';
  if(_ncCliSelecionado){
    cliId=_ncCliSelecionado.id;
    cliNome=_ncCliSelecionado.nome;
  } else if(nomeDigitado){
    const dup=CLIS.find(c=>c.nome.toLowerCase()===nomeDigitado.toLowerCase());
    if(dup){cliId=dup.id;cliNome=dup.nome;}
    else{
      const nome=nomeDigitado.charAt(0).toUpperCase()+nomeDigitado.slice(1);
      const {data,error}=await sb.from('pdv_clientes').insert({id:'cli'+uid(),nome}).select().single();
      if(error){toast('Erro ao cadastrar cliente','err');return;}
      CLIS.push(data);cliId=data.id;cliNome=data.nome;
    }
  } else{toast('Digite o nome do cliente','err');return;}

  // Verifica se cliente já tem comanda aberta hoje — usa ela em vez de criar nova
  const hoje=new Date();hoje.setHours(0,0,0,0);
  const cmdExistente=CMDS.find(c=>
    c.cliente_id===cliId &&
    (c.status==='aberta'||c.status==='pag_solicitado') &&
    new Date(c.aberta_em)>=hoje
  );
  if(cmdExistente){
    document.getElementById('olNovaCmd')?.remove();
    activeCmdId=cmdExistente.id;
    _afterAbrirComanda(cmdExistente);
    toast(`Comanda #${cmdExistente.numero||''} já aberta para ${cliNome} ✅`,'info');
    if(_pendingProdId){const p=_pendingProdId;_pendingProdId=null;await addItem(p);}
    return;
  }

  // Número: conta apenas as do dia atual para esse cliente
  const cmdsHojeCliente=CMDS.filter(c=>c.cliente_id===cliId&&new Date(c.aberta_em)>=hoje);
  const numero=cmdsHojeCliente.length+1;
  const cmd={id:'cmd'+uid(),cliente_id:cliId,cliente_nome:cliNome,numero,status:'aberta',total:0,desconto:0,pagamento:'',obs};
  const {data,error}=await sb.from('pdv_comandas').insert(cmd).select().single();
  if(error){toast('Erro ao abrir comanda: '+error.message,'err');console.error(error);return;}
  CMDS.unshift(data);
  document.getElementById('olNovaCmd')?.remove();
  activeCmdId=data.id;
  _afterAbrirComanda(data);
  toast(`Comanda #${numero} aberta 🧾`,'info');
  if(_pendingProdId){const p=_pendingProdId;_pendingProdId=null;await addItem(p);}
}

// Pós-abertura: atualiza tudo e vai pro PDV SEM triggar a lógica de desativar
function _afterAbrirComanda(cmd){
  // Garante que o modal sumiu
  document.getElementById('olNovaCmd')?.remove();
  // Atualiza desktop
  document.getElementById('noCmd').style.display='none';
  document.getElementById('cmdAtiva').style.display='flex';
  document.getElementById('cmdNome').textContent=cmd.cliente_nome;
  const dt=cmd.aberta_em?new Date(cmd.aberta_em).toLocaleDateString('pt-BR'):new Date().toLocaleDateString('pt-BR');
  document.getElementById('cmdId').textContent=dt+(cmd.numero?' · #'+cmd.numero:'');
  renderCmdItens();
  renderMiniCmds();
  if(_isMobile()){
    // Esconde noCmd-m e mostra cmdAtiva-m diretamente (não depende do sync)
    document.getElementById('noCmd-m').style.display='none';
    document.getElementById('cmdAtiva-m').style.display='flex';
    document.getElementById('cmdNome-m').textContent=cmd.cliente_nome;
    document.getElementById('cmdId-m').textContent=dt+(cmd.numero?' · #'+cmd.numero:'');
    _updateCmdBar();
    _updateComandaBadge();
    // Vai pro PDV para lançar produtos
    _currentNav='';
    _pushNav('pdv');
    _navActivate('pdv');
    toast('🧾 '+cmd.cliente_nome+' — lançando pedidos','ok');
  }
}

/* ════ SELECIONAR / SAIR COMANDA ════ */
function selecionarCmd(id){
  activeCmdId=id;
  const c=CMDS.find(x=>x.id===id);if(!c)return;
  // Desktop
  document.getElementById('noCmd').style.display='none';
  document.getElementById('cmdAtiva').style.display='flex';
  document.getElementById('cmdNome').textContent=c.cliente_nome;
  const dt=c.aberta_em?new Date(c.aberta_em).toLocaleDateString('pt-BR'):new Date().toLocaleDateString('pt-BR');
  const num=c.numero?` · #${c.numero}`:'';
  document.getElementById('cmdId').textContent=dt+num+(c.obs?' · '+c.obs:'');
  renderCmdItens();renderMiniCmds();
  // Mobile: mostra itens da comanda selecionada
  if(_isMobile()){
    _mobileShowingList=false; // mostrar itens, não lista
    _syncComandaMobile();
    _updateCmdBar();
    _navActivate('comanda-mobile');
  }
}
function sairComanda(){
  activeCmdId=null;
  _mobileShowingList=true;
  document.getElementById('noCmd').style.display='flex';
  document.getElementById('cmdAtiva').style.display='none';
  renderMiniCmds();
  if(_isMobile()){
    // Sempre força a tela de lista no mobile
    _syncComandaMobile();
    _updateCmdBar();
    _navActivate('comanda-mobile');
    document.querySelectorAll('.mnav-btn').forEach(b=>b.classList.remove('active'));
    document.getElementById('mnb-comanda-mobile')?.classList.add('active');
  }
}
function _irAoPDV(){
  _pushNav('pdv');
  _navActivate('pdv');
}

/* ════ ITENS ════ */
function renderCmdItens(){
  const el=document.getElementById('cmdItens');
  const its=itensDe(activeCmdId);
  if(!its.length){
    el.innerHTML=`<div class="cmd-empty"><div class="cmd-empty-icon">🍢</div><span style="font-size:13px">Clique nos produtos para adicionar</span></div>`;
    atualizarTotal();return;
  }
  const grp={};
  its.forEach(i=>{
    if(!grp[i.produto_id])grp[i.produto_id]={...i,qty:0,subtotal:0,ids:[],para_levar:false};
    grp[i.produto_id].qty+=Number(i.qty);
    grp[i.produto_id].subtotal+=Number(i.subtotal);
    grp[i.produto_id].ids.push(i.id);
    if(i.para_levar)grp[i.produto_id].para_levar=true;
  });
  const cmd=CMDS.find(x=>x.id===activeCmdId);
  const isFechada=cmd&&(cmd.status==='fechada'||cmd.status==='cancelada');
  el.innerHTML=Object.values(grp).map(g=>`<div class="cmd-item">
    <div class="cmd-item-emoji">${esc(g.emoji||'🍢')}</div>
    <div class="cmd-item-info">
      <div class="cmd-item-nome">${esc(g.produto_nome)}${!isFechada?`<span class="levar-badge ${g.para_levar?'on':''}" onclick="toggleLevar('${g.produto_id}')">🛍levar</span>`:''}</div>
      <div class="cmd-item-unit">R$ ${fmtR(g.preco_unit)} un.</div>
    </div>
    ${isFechada
      ? `<span style="font-family:var(--display);font-size:18px;font-weight:700;color:var(--muted);padding:0 8px">${g.qty}×</span>`
      : `<div class="qty-ctrl">
      <button class="qbtn" onclick="removeItem('${g.produto_id}')">−</button>
      <span class="qnum">${g.qty}</span>
      <button class="qbtn" onclick="addItem('${g.produto_id}')">+</button>
    </div>`}
    <div class="cmd-item-sub">R$ ${fmtR(g.subtotal)}</div>
  </div>`).join('');
  atualizarTotal();
  _updateCmdFechadaBanner();
  // Espelha para mobile
  const mEl=document.getElementById('cmdItens-m');
  if(mEl) mEl.innerHTML=el.innerHTML;
  const mTot=document.getElementById('cmdTotal-m');
  if(mTot) mTot.textContent=document.getElementById('cmdTotal').textContent;
}
function _updateCmdFechadaBanner(){
  const cmd=activeCmdId?CMDS.find(x=>x.id===activeCmdId):null;
  const isFechada=cmd&&(cmd.status==='fechada'||cmd.status==='cancelada');
  // Footer de ações
  const footer=document.getElementById('cmdFooter');
  if(footer)footer.style.display=isFechada?'none':'flex';
  // Banner de fechada
  let banner=document.getElementById('cmdFechadaBanner');
  if(isFechada){
    if(!banner){
      banner=document.createElement('div');banner.id='cmdFechadaBanner';
      banner.style.cssText='background:var(--s2);border-top:1px solid var(--border);padding:10px 14px;font-size:12px;color:var(--muted);text-align:center;flex-shrink:0';
      const foot=document.getElementById('cmdFooter');
      if(foot)foot.parentNode.insertBefore(banner,foot.nextSibling);
    }
    const hora=cmd.fechada_em?new Date(cmd.fechada_em).toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'}):'';
    banner.innerHTML=`✅ Comanda fechada${hora?' às '+hora:''}${cmd.fechada_por?' por <strong style="color:var(--text)">'+esc(cmd.fechada_por)+'</strong>':''}`;
  } else {
    banner?.remove();
  }
}
function atualizarTotal(){
  const c=CMDS.find(x=>x.id===activeCmdId);
  const sub=itensDe(activeCmdId).reduce((a,i)=>a+Number(i.subtotal),0);
  const total=Math.max(0,sub-Number(c?.desconto||0));
  document.getElementById('cmdTotal').textContent=fmtR(total);
  if(c)c.total=total;
}

/* ════ ADD / REMOVE ITEM (com controle de estoque) ════ */
let _pendingProdId=null; // produto aguardando abertura de comanda

async function addItem(prodId){
  const _cmd=activeCmdId?CMDS.find(x=>x.id===activeCmdId):null;
  if(_cmd&&(_cmd.status==='fechada'||_cmd.status==='cancelada')){toast('Comanda já fechada — não é possível adicionar itens','err');return;}
  if(!activeCmdId){
    _pendingProdId=prodId;
    abrirNovaComanda();
    return;
  }
  const prod=PRODS.find(p=>p.id===prodId);if(!prod)return;
  if(prod.estoque<=0){toast('Sem estoque!','err');return;}
  const item={id:'item'+uid(),comanda_id:activeCmdId,produto_id:prodId,produto_nome:prod.nome,emoji:prod.emoji,qty:1,preco_unit:prod.preco,subtotal:prod.preco,para_levar:false};
  ITENS.push(item);
  // Baixa estoque local imediatamente
  prod.estoque--;
  renderCmdItens();renderGrid();
  document.querySelectorAll('.prod-card').forEach(el=>{
    if(el.getAttribute('onclick')?.includes(prodId)){el.style.transform='scale(.93)';setTimeout(()=>el.style.transform='',150);}
  });
  // Feedback visual mobile
  if(_isMobile()){
    const cmd=CMDS.find(c=>c.id===activeCmdId);
    _showItemToast(prod, cmd);
    _updateCmdBar();
  }
  const {error}=await sb.from('pdv_itens').insert(item);
  if(error){
    ITENS=ITENS.filter(i=>i.id!==item.id);prod.estoque++;
    renderCmdItens();renderGrid();toast('Erro ao adicionar','err');return;
  }
  // Baixa estoque no BD
  await sb.from('pdv_produtos').update({estoque:prod.estoque,updated_at:new Date().toISOString()}).eq('id',prodId);
  await _syncTotal(activeCmdId);
  _updateCmdBar();
  renderMiniCmds();
}

function _trocarComanda(){
  if(!activeCmdId){toast('Nenhuma comanda ativa','err');return;}
  const origem=CMDS.find(x=>x.id===activeCmdId);
  if(!origem)return;
  const itensOrigem=itensDe(activeCmdId);
  if(!itensOrigem.length){toast('Comanda sem itens','err');return;}

  // Agrupa itens por produto
  const grp={};
  itensOrigem.forEach(i=>{
    if(!grp[i.produto_id])grp[i.produto_id]={...i,qty:0,subtotal:0,ids:[]};
    grp[i.produto_id].qty+=Number(i.qty);
    grp[i.produto_id].subtotal+=Number(i.subtotal);
    grp[i.produto_id].ids.push(i.id);
  });
  const grupos=Object.values(grp);

  // Comandas abertas (exceto a atual)
  const abertas=CMDS.filter(c=>c.id!==activeCmdId&&(c.status==='aberta'||c.status==='pag_solicitado'));

  const ol=document.createElement('div');ol.className='overlay';ol.id='olTrocar';
  ol.innerHTML=`<div class="modal" style="max-width:460px">
    <div class="modal-title">↕ Transferir Itens</div>
    <div class="modal-sub">De: <strong style="color:var(--fire)">${esc(origem.cliente_nome)}</strong></div>

    <div class="fgrp">
      <label class="flabel">Selecione os itens a transferir</label>
      <div id="trocaItens" style="background:var(--s2);border-radius:8px;overflow:hidden;margin-bottom:2px">
        ${grupos.map((g,idx)=>`
          <div style="display:flex;align-items:center;gap:10px;padding:10px 12px;border-bottom:1px solid var(--border)22">
            <input type="checkbox" id="tci_${idx}" value="${g.produto_id}" checked
              style="width:18px;height:18px;accent-color:var(--fire);flex-shrink:0;cursor:pointer">
            <label for="tci_${idx}" style="flex:1;cursor:pointer;font-size:13px;font-weight:600">${esc(g.emoji||'🍢')} ${esc(g.produto_nome)}</label>
            <div style="display:flex;align-items:center;gap:6px">
              <button onclick="_trocaQtyAdj(${idx},-1,${g.qty})" style="width:24px;height:24px;border-radius:6px;border:1px solid var(--border);background:var(--s3);color:var(--text);cursor:pointer;font-size:14px;line-height:1">−</button>
              <span id="tci_qty_${idx}" style="font-family:var(--display);font-weight:700;min-width:20px;text-align:center">${g.qty}</span>
              <span style="color:var(--muted);font-size:11px">/ ${g.qty}</span>
              <button onclick="_trocaQtyAdj(${idx},1,${g.qty})" style="width:24px;height:24px;border-radius:6px;border:1px solid var(--border);background:var(--s3);color:var(--text);cursor:pointer;font-size:14px;line-height:1">+</button>
            </div>
          </div>`).join('')}
      </div>
    </div>

    <div class="fgrp">
      <label class="flabel">Destino</label>
      <div id="trocaDestino">
        ${abertas.length?abertas.map(c=>`
          <div onclick="_trocaSelDest('${c.id}')" id="trocaDest_${c.id}"
            style="display:flex;align-items:center;justify-content:space-between;padding:10px 12px;background:var(--s2);border:2px solid var(--border);border-radius:8px;margin-bottom:6px;cursor:pointer;transition:border-color .15s">
            <span style="font-weight:700">${esc(c.cliente_nome)}</span>
            <span style="font-size:12px;color:var(--muted)">${itensDe(c.id).length} item(s)</span>
          </div>`).join(''):''}
        <div onclick="_trocaSelDest('__nova__')" id="trocaDest___nova__"
          style="display:flex;align-items:center;gap:8px;padding:10px 12px;background:var(--s2);border:2px solid var(--border);border-radius:8px;cursor:pointer;transition:border-color .15s">
          <span style="color:var(--fire);font-size:18px;font-weight:700">＋</span>
          <span style="font-weight:700">Nova comanda…</span>
        </div>
      </div>
    </div>

    <div id="trocaNovaCliWrap" style="display:none" class="fgrp">
      <label class="flabel">Nome do novo cliente</label>
      <input id="trocaNovaCli" class="finput" placeholder="Digite o nome…">
    </div>

    <div class="modal-btns">
      <button class="btn-cancel" onclick="document.getElementById('olTrocar').remove()">Cancelar</button>
      <button class="btn-save" onclick="_confirmarTroca('${activeCmdId}')">TRANSFERIR</button>

  </div>`;

  ol.addEventListener('click',e=>{if(e.target===ol)ol.remove();});

  // Armazena qtds máximas
  window._trocaGrupos=grupos;
  window._trocaQtds=grupos.map(g=>g.qty);

}

function _trocaQtyAdj(idx, delta, max){
  const qtds=window._trocaQtds;
  qtds[idx]=Math.max(0,Math.min(max,qtds[idx]+delta));
  const el=document.getElementById('tci_qty_'+idx);
  if(el)el.textContent=qtds[idx];
  // Se 0, desmarca checkbox
  const cb=document.getElementById('tci_'+idx);
  if(cb)cb.checked=qtds[idx]>0;
}

function _trocaSelDest(id){
  // Remove seleção anterior
  document.querySelectorAll('[id^="trocaDest_"]').forEach(el=>{
    el.style.borderColor='var(--border)';
  });
  const el=document.getElementById('trocaDest_'+id);
  if(el)el.style.borderColor='var(--fire)';
  window._trocaDestId=id;
  const wrap=document.getElementById('trocaNovaCliWrap');
  if(wrap)wrap.style.display=id==='__nova__'?'block':'none';
  if(id==='__nova__')setTimeout(()=>document.getElementById('trocaNovaCli')?.focus(),60);
}

async function _confirmarTroca(origemId){
  const destId=window._trocaDestId;
  if(!destId){toast('Selecione o destino','err');return;}

  const grupos=window._trocaGrupos;
  const qtds=window._trocaQtds;

  // Filtra itens selecionados com qty > 0
  const selecionados=grupos.filter((_,i)=>{
    const cb=document.getElementById('tci_'+i);
    return cb?.checked && qtds[i]>0;
  }).map((g,i)=>({...g,qtdTransf:qtds[grupos.indexOf(g)]}));

  if(!selecionados.length){toast('Selecione pelo menos um item','err');return;}

  // Define ou cria comanda destino
  let cmdDestId=destId;
  if(destId==='__nova__'){
    const nomeNovo=(document.getElementById('trocaNovaCli')?.value||'').trim();
    if(!nomeNovo){toast('Digite o nome do novo cliente','err');return;}
    // Cria cliente
    let cli=CLIS.find(c=>c.nome.toLowerCase()===nomeNovo.toLowerCase());
    if(!cli){
      const {data,error}=await sb.from('pdv_clientes').insert({id:'cli'+uid(),nome:nomeNovo}).select().single();
      if(error){toast('Erro ao criar cliente','err');return;}
      CLIS.push(data);cli=data;
    }
    // Cria comanda
    const cmd={id:'cmd'+uid(),cliente_id:cli.id,cliente_nome:cli.nome,status:'aberta',total:0,desconto:0,aberta_em:new Date().toISOString(),updated_at:new Date().toISOString()};
    const {error}=await sb.from('pdv_comandas').insert(cmd);
    if(error){toast('Erro ao criar comanda','err');return;}
    CMDS.push(cmd);cmdDestId=cmd.id;
  }

  // Transfere cada grupo selecionado
  for(const g of selecionados){
    const qtdTransf=g.qtdTransf;
    const qtdTotal=g.qty;
    const idsParaMover=g.ids.slice(0,qtdTransf); // pega os N primeiros ids

    // Move itens para a comanda destino
    for(const itemId of idsParaMover){
      const item=ITENS.find(x=>x.id===itemId);
      if(item){item.comanda_id=cmdDestId;}
      await sb.from('pdv_itens').update({comanda_id:cmdDestId,updated_at:new Date().toISOString()}).eq('id',itemId);
    }

    // Se transferiu só parte, deixa o resto na origem
  }

  // Recalcula totais de ambas as comandas
  await _syncTotal(origemId);
  await _syncTotal(cmdDestId);

  document.getElementById('olTrocar')?.remove();
  // Se ficou sem itens na origem, deleta a comanda (some da lista)
  const restantes=itensDe(origemId);
  if(!restantes.length){
    sairComanda();
    // Remove da memória e do banco
    CMDS=CMDS.filter(c=>c.id!==origemId);
    await sb.from('pdv_comandas').delete().eq('id',origemId);
    renderMiniCmds();renderMiniCmdsMobile();
    toast('Itens transferidos — comanda removida','ok');
  } else {
    renderCmdItens();renderMiniCmds();renderMiniCmdsMobile();
    toast('✅ Itens transferidos!','ok');
  }
}
async function removeItem(prodId){
  const its=ITENS.filter(i=>i.comanda_id===activeCmdId&&i.produto_id===prodId);
  if(!its.length)return;
  const last=its[its.length-1];
  const cmdId=activeCmdId;
  ITENS=ITENS.filter(i=>i.id!==last.id);
  // Devolve estoque local
  const prod=PRODS.find(p=>p.id===prodId);
  if(prod)prod.estoque++;
  renderCmdItens();renderGrid();
  await sb.from('pdv_itens').delete().eq('id',last.id);
  // Devolve estoque no BD
  if(prod) await sb.from('pdv_produtos').update({estoque:prod.estoque,updated_at:new Date().toISOString()}).eq('id',prodId);
  // Se comanda ficou vazia, deleta ela
  const restantes=itensDe(cmdId);
  if(!restantes.length){
    sairComanda();
    CMDS=CMDS.filter(c=>c.id!==cmdId);
    await sb.from('pdv_comandas').delete().eq('id',cmdId);
    renderMiniCmds();renderMiniCmdsMobile();
    toast('Comanda removida (sem itens)','info');
  } else {
    await _syncTotal(cmdId);
    renderMiniCmds();
  }
}
async function toggleLevar(prodId){
  const its=ITENS.filter(i=>i.comanda_id===activeCmdId&&i.produto_id===prodId);
  if(!its.length)return;
  const novo=!its[0].para_levar;
  its.forEach(i=>i.para_levar=novo);
  renderCmdItens();
  await sb.from('pdv_itens').update({para_levar:novo}).eq('comanda_id',activeCmdId).eq('produto_id',prodId);
}
async function _syncTotal(id){
  const c=CMDS.find(x=>x.id===id);if(!c)return;
  const sub=itensDe(id).reduce((a,i)=>a+Number(i.subtotal),0);
  const tot=Math.max(0,sub-Number(c.desconto||0));c.total=tot;
  await sb.from('pdv_comandas').update({total:tot,updated_at:new Date().toISOString()}).eq('id',id);
}

async function _fecharCmd(){
  const pag=(document.getElementById('fcPag')?.value||'').trim();
  if(!pag){toast('Selecione o pagamento','err');return;}
  const c=CMDS.find(x=>x.id===activeCmdId);if(!c)return;
  const its=itensDe(activeCmdId);
  const sub=its.reduce((a,i)=>a+Number(i.subtotal),0);
  const tot=Math.max(0,sub-Number(c.desconto||0));
  const now=new Date().toISOString();
  const por=currentUser?.nome||currentUser?.usuario||'';
  // Atualiza objeto local imediatamente
  c.status='fechada';c.pagamento=pag;c.total=tot;c.fechada_em=now;c.fechada_por=por;
  const {error}=await sb.from('pdv_comandas').update({
    status:'fechada', pagamento:pag, total:tot,
    fechada_em:now, fechada_por:por, updated_at:now
  }).eq('id',activeCmdId);
  if(error){toast('Erro ao fechar: '+error.message,'err');return;}
  document.getElementById('olFechar')?.remove();
  const horaFecha=new Date().toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'});
  toast('✅ Fechada às '+horaFecha+' · R$ '+fmtR(tot),'ok');
  sairComanda();
  // Recarrega comandas do banco para garantir status atualizado
  const {data}=await sb.from('pdv_comandas').select('*').order('aberta_em',{ascending:false});
  if(data)CMDS=data.map(_parseCmdPagamento);
  renderMiniCmds();_updateComandaBadge();renderMiniCmdsMobile();
}

/* ════ CANCELAR COMANDA (devolve estoque) ════ */
async function cancelarComanda(){
  const c=CMDS.find(x=>x.id===activeCmdId);if(!c)return;
  const its=itensDe(activeCmdId);
  const temItens=its.length>0;
  // Modal de confirmação com motivo
  const ol=document.createElement('div');ol.className='overlay';ol.id='olCancelar';
  ol.innerHTML=`<div class="modal" style="max-width:380px">
    <div class="modal-title">🗑 Cancelar Comanda</div>
    <div class="modal-sub">${esc(c.cliente_nome)}${c.numero?' · #'+c.numero:''}</div>
    ${temItens?`<div style="background:var(--red)22;border:1px solid var(--red)44;border-radius:8px;padding:10px 12px;margin-bottom:12px;font-size:13px;color:var(--red)">
      ⚠️ Esta comanda tem ${its.length} item(s). Os itens voltam ao estoque.
    </div>`:''}
    <div class="fgrp"><label class="flabel">Motivo do cancelamento ${temItens?'(obrigatório)':'(opcional)'}</label>
      <input id="cancelMotivo" class="finput" placeholder="Ex: Cliente desistiu, erro no pedido…">
    </div>
    <div class="modal-btns">
      <button class="btn-cancel" onclick="document.getElementById('olCancelar').remove()">Voltar</button>
      <button class="btn-save" style="background:var(--red)" onclick="_confirmarCancelamento()">CANCELAR COMANDA</button>
    </div>
  </div>`;
  document.body.appendChild(ol);ol.addEventListener('click',e=>{if(e.target===ol)ol.remove();});
}
async function _confirmarCancelamento(){
  const c=CMDS.find(x=>x.id===activeCmdId);if(!c)return;
  const its=itensDe(activeCmdId);
  const temItens=its.length>0;
  const motivo=(document.getElementById('cancelMotivo')?.value||'').trim();
  if(temItens&&!motivo){toast('Informe o motivo do cancelamento','err');return;}
  document.getElementById('olCancelar')?.remove();
  const por=currentUser?.nome||currentUser?.usuario||'';
  const now=new Date().toISOString();
  c.status='cancelada';c.fechada_em=now;c.fechada_por=por;
  // Guarda snapshot dos itens antes de limpar
  c._itens_snapshot=its.map(i=>({...i})); // só memória, não vai pro banco
  // Devolve estoque
  const restores={};
  its.forEach(i=>{restores[i.produto_id]=(restores[i.produto_id]||0)+Number(i.qty);});
  for(const [prodId,qty] of Object.entries(restores)){
    const prod=PRODS.find(p=>p.id===prodId);
    if(prod){prod.estoque+=qty;await sb.from('pdv_produtos').update({estoque:prod.estoque,updated_at:now}).eq('id',prodId);}
  }
  // Snapshot dos itens (para exibir após cancelamento)
  const snapshotJson=JSON.stringify(its.map(i=>({
    produto_id:i.produto_id,produto_nome:i.produto_nome,emoji:i.emoji,qty:i.qty,subtotal:i.subtotal
  })));
  ITENS=ITENS.filter(i=>i.comanda_id!==activeCmdId);
  const pagCancel='CANCELADO'+(motivo?'||'+motivo:'');
  await sb.from('pdv_comandas').update({
    status:'cancelada', pagamento:pagCancel,
    fechada_em:now, fechada_por:por,
    updated_at:now
  }).eq('id',activeCmdId);
  // Itens ficam no banco — NÃO deletar, para exibir no histórico
  renderGrid();toast('Comanda cancelada — estoque devolvido','err');
  sairComanda();
}

function setFlt(f){
  fltCmdAtual=f;
  const map={'aberta':'fltAberta','pag_solicitado':'fltPagSol','fechada':'fltFechada','cancelada':'fltCancelada','todas':'fltTodas','hoje':'fltHoje'};
  Object.entries(map).forEach(([k,v])=>document.getElementById(v)?.classList.toggle('active',k===f));
  renderComandasScreen();
}
function renderComandasScreen(){
  // Sincroniza botões de filtro
  ['aberta','fechada','cancelada','todas','hoje'].forEach(f=>{
    const id={aberta:'fltAberta',fechada:'fltFechada',cancelada:'fltCancelada',todas:'fltTodas',hoje:'fltHoje'}[f];
    document.getElementById(id)?.classList.toggle('active', fltCmdAtual===f);
  });
  const hoje=new Date();hoje.setHours(0,0,0,0);
  let list;
  if(fltCmdAtual==='hoje'){
    // Padrão: abertas + fechadas hoje (o que o usuário quer ver no dia a dia)
    list=CMDS.filter(c=>{
      const d=new Date(c.aberta_em||c.updated_at);
      return d>=hoje && (c.status==='aberta'||c.status==='fechada'||c.status==='pag_solicitado');
    });
    // Ordena: abertas primeiro, depois fechadas por hora desc
    list.sort((a,b)=>{
      const order={aberta:0,pag_solicitado:1,fechada:2};
      const oa=order[a.status]??3, ob=order[b.status]??3;
      if(oa!==ob)return oa-ob;
      return new Date(b.aberta_em)-new Date(a.aberta_em);
    });
  } else if(fltCmdAtual==='todas'){
    list=[...CMDS].sort((a,b)=>new Date(b.aberta_em)-new Date(a.aberta_em));
  } else {
    list=CMDS.filter(c=>c.status===fltCmdAtual)
             .sort((a,b)=>new Date(b.aberta_em)-new Date(a.aberta_em));
  }
  const el=document.getElementById('comanContent');
  if(!list.length){el.innerHTML=`<div style="text-align:center;padding:48px;color:var(--muted)">Nenhuma comanda</div>`;return;}
  el.innerHTML=list.map(c=>{
    const its=itensDe(c.id);
    const isFechada=c.status==='fechada'||c.status==='cancelada';
    const dtAbertura=new Date(c.aberta_em).toLocaleString('pt-BR',{day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit'});
    const stCls=c.status==='aberta'?'pill-green':c.status==='fechada'?'pill-fire':c.status==='pag_solicitado'?'pp':c.status==='cancelada'?'pill-red':'pill-muted';
    const stLabel=c.status==='aberta'?'ABERTA':c.status==='fechada'?'FECHADA':c.status==='pag_solicitado'?'AGUARD. PAG.':c.status==='cancelada'?'CANCELADA':c.status.toUpperCase();
    const num=c.numero?` #${c.numero}`:'';
    const levarCnt=its.filter(i=>i.para_levar).length;
    // Fechada: click abre modal visualização. Aberta: vai pro PDV
    const clickFn=isFechada?`_verComandaFechada('${c.id}')`:`_irComanda('${c.id}')`;
    return `<div class="hist-card" onclick="${clickFn}" style="${isFechada?'opacity:.85':''}">
      <div style="display:flex;align-items:center;gap:12px">
        <div style="flex:1;min-width:0">
          <div style="display:flex;align-items:center;gap:8px;margin-bottom:3px;flex-wrap:wrap">
            <span style="font-weight:700">${esc(c.cliente_nome)}</span>
            <span style="font-size:11px;color:var(--ember)">${num}</span>
            <span class="pill ${stCls}">${stLabel}</span>
            ${levarCnt?`<span class="pill pill-blue">🛍 ${levarCnt} levar</span>`:''}
          </div>
          <div style="font-size:11px;color:var(--muted)">${dtAbertura} · ${its.length} item(s)${c.pagamento?' · <strong style="color:var(--ember)">'+esc(c.pagamento)+'</strong>':''}</div>
          ${isFechada&&c.fechada_em?`<div style="font-size:11px;color:var(--green);margin-top:3px">
            ✅ Fechada às ${new Date(c.fechada_em).toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'})}
            ${c.fechada_por?`· <strong style="color:var(--text)">${esc(c.fechada_por)}</strong>`:''}
          </div>`:''}
          ${(c.obs&&!c.obs.includes('[snapshot]'))?`<div style="font-size:11px;color:var(--ember);margin-top:2px">📝 ${esc(c.obs)}</div>`:''}
        </div>
        <div style="flex-shrink:0;text-align:right">
          <div style="font-family:var(--display);font-size:22px;font-weight:800;color:${isFechada?'var(--muted)':'var(--fire)'}">R$ ${fmtR(c.total)}</div>
          ${c.status==='pag_solicitado'?`<button style="margin-top:4px;padding:5px 10px;border-radius:7px;border:none;background:var(--green);color:#fff;font-family:var(--display);font-size:12px;font-weight:700;cursor:pointer" onclick="event.stopPropagation();confirmarPagamento('${c.id}')">✅ Confirmar</button>`:''}

function _irComanda(id){
  const c=CMDS.find(x=>x.id===id);if(!c)return;
  if(c.status==='fechada'||c.status==='cancelada'){_verComandaFechada(id);return;}
  if(_isMobile()&&!currentUser?._isAdmin){navComandaMobile();selecionarCmd(id);}
  else{nav('pdv');selecionarCmd(id);}
}
function _verComandaFechada(id){
  const c=CMDS.find(x=>x.id===id);if(!c)return;
  const its=itensDe(id);
  const grp={};
  its.forEach(i=>{
    if(!grp[i.produto_id])grp[i.produto_id]={...i,qty:0,subtotal:0};
    grp[i.produto_id].qty+=Number(i.qty);
    grp[i.produto_id].subtotal+=Number(i.subtotal);
  });
  // Para canceladas: tenta itens do banco (agora mantidos), depois snapshot no obs, depois memória
  // Itens cancelados ficam no banco — grp já tem os dados
  // Fallback: snapshot em memória (mesma sessão)
  const itensParaMostrar=Object.values(grp).length?Object.values(grp):(c._itens_snapshot||[]);
  const itensHtml=itensParaMostrar.map(g=>`
    <div style="display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--border)22">
      <span style="font-size:20px">${esc(g.emoji||'🍢')}</span>
      <span style="flex:1;font-size:13px">${esc(g.produto_nome||g.nome||'')}</span>
      <span style="font-family:var(--display);font-size:16px;font-weight:700;color:var(--muted)">${g.qty}×</span>
      <span style="font-family:var(--display);font-size:15px;font-weight:700;color:var(--text)">R$ ${fmtR(g.subtotal)}</span>
    </div>`).join('')||'<div style="color:var(--muted);font-size:13px;padding:8px 0">Itens não disponíveis</div>';
  const isCancelada=c.status==='cancelada';
  const dtAb=new Date(c.aberta_em).toLocaleString('pt-BR');
  const dtFech=c.fechada_em?new Date(c.fechada_em).toLocaleString('pt-BR'):'—';
  // Extrai motivo do campo pagamento "CANCELADO||motivo"
  let canceladoPor=c.fechada_por||'';
  let cancelMotivo='';
  if(c.pagamento&&c.pagamento.startsWith('CANCELADO||')){
    cancelMotivo=c.pagamento.slice('CANCELADO||'.length).trim();
  }
  const ol=document.createElement('div');ol.className='overlay';ol.id='olVerCmd';
  ol.innerHTML=`<div class="modal" style="max-width:440px">
    <div class="modal-title">${isCancelada?'🚫':'🧾'} ${esc(c.cliente_nome)}${c.numero?' #'+c.numero:''}</div>
    ${isCancelada?`<div style="background:var(--red)22;border:1px solid var(--red)44;border-radius:8px;padding:8px 12px;margin-bottom:12px;font-size:13px;color:var(--red)">
      🗑 Cancelada${canceladoPor?' por <strong style="color:var(--text)">'+esc(canceladoPor)+'</strong>':''}${dtFech!=='—'?' às '+new Date(c.fechada_em).toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'}):''}
      ${cancelMotivo?`<div style="margin-top:6px;padding-top:6px;border-top:1px solid var(--red)33;color:var(--muted)">Motivo: <strong style="color:var(--text)">${esc(cancelMotivo)}</strong></div>`:''}
    </div>`:''}
    ${(()=>{
      const _ab2=c.aberta_em?new Date(c.aberta_em):null;
      const _fe2=c.fechada_em?new Date(c.fechada_em):null;
      const _min2=(_ab2&&_fe2)?Math.max(0,Math.round((_fe2-_ab2)/60000)):null;
      const _perm=_min2===null?null:(_min2>=60?(Math.floor(_min2/60)+'h'+(_min2%60>0?' '+(_min2%60)+'min':'')):((_min2||1)+'min'));
      return _perm?`<div style="background:var(--fire)22;border:1px solid var(--fire)44;border-radius:8px;padding:8px 12px;margin-bottom:10px;display:flex;justify-content:space-between;align-items:center">
        <span style="font-size:11px;color:var(--muted);text-transform:uppercase">Permanência</span>
        <span style="font-family:var(--display);font-size:20px;font-weight:800;color:var(--fire)">${_perm}</span>
      </div>`:'';
    })()}
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;background:var(--s2);border-radius:10px;padding:12px;margin-bottom:14px;font-size:12px">
      <div style="color:var(--muted)">Aberta em<br><strong style="color:var(--text);font-size:13px">${dtAb}</strong></div>
      <div style="color:var(--muted)">${isCancelada?'Cancelada em':'Fechada em'}<br><strong style="color:${isCancelada?'var(--red)':'var(--green)'};font-size:13px">${dtFech}</strong></div>
      <div style="color:var(--muted)">${isCancelada?'Cancelada por':'Fechada por'}<br><strong style="color:var(--text);font-size:13px">${esc(isCancelada?canceladoPor:c.fechada_por)||'—'}</strong></div>
      <div style="color:var(--muted)">Pagamento<br><strong style="color:var(--ember);font-size:13px">${isCancelada?'—':esc(c.pagamento||'—')}</strong></div>

    ${(c.obs&&!c.obs.includes('[snapshot]'))?`<div style="font-size:12px;color:var(--ember);margin-bottom:8px">📝 ${esc(c.obs)}</div>`:''}
    <button class="btn-cancel" style="width:100%" onclick="document.getElementById('olVerCmd').remove()">Fechar</button>
  </div>`;
  document.body.appendChild(ol);ol.addEventListener('click',e=>{if(e.target===ol)ol.remove();});
}
